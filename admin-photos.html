  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/japan-tcg-price-guide/base.css">
  <title>Admin - Sync Price Photos</title>
  <style>
    body { max-width: 800px; margin: 40px auto; padding: 20px; }
    pre { background: #f5f5f5; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: .85em; }
    button { padding: 10px 20px; background: #2563eb; color: #fff; border: none; border-radius: 6px; cursor: pointer; margin-right: 10px; }
    .danger { background: #dc2626; }
  </style>
</head>
<body>
  <h1>Admin: Sync Price Photos</h1>
  <p>Pending photos from mobile uploads are stored in localStorage. Copy the JSON below to <code>data/price-photos.json</code> and commit.</p>
  
  <button onclick="showJSON()">Show JSON to Copy</button>
  <button onclick="clearPending()" class="danger">Clear Pending</button>
  
  <pre id="output">Click "Show JSON" to see pending photos</pre>
  
  <script>
    function showJSON() {
      const pending = JSON.parse(localStorage.getItem('price-photos-pending') || '{}');
      
      // Merge with existing format (single photo per card for now)
      const photos = {};
      Object.entries(pending).forEach(([cardId, entries]) => {
        if (entries.length > 0) {
          const latest = entries[entries.length - 1];
          photos[cardId] = {
            url: latest.url,
            price: latest.price,
            condition: latest.condition,
            location: latest.coords ? `${latest.coords.lat.toFixed(4)}, ${latest.coords.lng.toFixed(4)}` : null,
            date: latest.date
          };
        }
      });
      
      document.getElementById('output').textContent = JSON.stringify({ photos }, null, 2);
    }
    
    function clearPending() {
      if (confirm('Clear all pending photos from localStorage?')) {
        localStorage.removeItem('price-photos-pending');
        document.getElementById('output').textContent = 'Cleared!';
      }
    }
  </script>
</body>
</html>
