<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/japan-tcg-price-guide/base.css">
<title>Rip or Keep? | Should You Open That Pokemon Pack?</title>
<meta name="description" content="Decide whether to open or keep sealed Japanese Pokemon packs. Compare current sealed value vs expected value from opening.">
<link rel="canonical" href="https://arthurb2l.github.io/japan-pokemon-card-price-guide/tools/rip-or-keep.html">
<style>
h1{text-align:center;color:#222;font-size:1.5em;margin:20px 0}
.breadcrumb{font-size:.85em;margin-bottom:15px}
.calc{background:#fff;border-radius:12px;padding:20px;margin:20px 0;border:1px solid #ddd}
label{display:block;margin:15px 0 5px;color:#222;font-weight:500}
input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#222;font-size:1em}
input:focus{outline:none;border-color:#EE1515}
button{width:100%;padding:14px;background:#EE1515;color:#fff;border:none;border-radius:6px;font-size:1.1em;font-weight:bold;cursor:pointer;margin-top:20px}
.result{background:#f9f9f9;border-radius:8px;padding:20px;margin-top:20px;text-align:center;display:none;border:1px solid #ddd}
.result.show{display:block}
.verdict{font-size:1.8em;font-weight:bold;margin-bottom:10px}
.rip{color:#EE1515}
.keep{color:#166534}
.details{color:#666;font-size:.9em;line-height:1.6}
.bar{display:flex;height:30px;border-radius:6px;overflow:hidden;margin:15px 0}
.bar-rip{background:#EE1515}
.bar-keep{background:#166534}
footer{text-align:center;padding:20px;color:#666;font-size:.8em}
</style>
<link rel="icon" href="/japan-tcg-price-guide/favicon.svg">
</head>
<body>
<script src="/japan-tcg-price-guide/components/header.js"></script>
<div class="breadcrumb"><a href="../">← Back to Price Guide</a></div>
<h1>🎰 Rip or Keep?</h1>
<div class="calc">
<label>Current Sealed Value (¥)</label>
<input type="number" id="sealedValue" placeholder="2200">
<label>Chase Card Value (¥)</label>
<input type="number" id="chaseValue" placeholder="50000">
<label>Pull Rate (1 in X packs)</label>
<input type="number" id="pullRate" placeholder="300" value="300">
<label>Bulk Value per Pack (¥)</label>
<input type="number" id="bulkValue" placeholder="20" value="20">
<button onclick="decide()">Should I Rip?</button>
<div class="result" id="result">
<div class="verdict" id="verdict"></div>
<div class="bar" id="bar"></div>
<div class="details" id="details"></div>
</div>
</div>
<script>
function decide() {
  const sealed = parseFloat(document.getElementById('sealedValue').value) || 0;
  const chase = parseFloat(document.getElementById('chaseValue').value) || 0;
  const rate = parseFloat(document.getElementById('pullRate').value) || 1;
  const bulk = parseFloat(document.getElementById('bulkValue').value) || 0;
  const ev = (chase / rate) + bulk;
  const verdictEl = document.getElementById('verdict');
  const barEl = document.getElementById('bar');
  const detailsEl = document.getElementById('details');
  const resultEl = document.getElementById('result');
  const ripPct = Math.min(100, Math.max(0, (ev / (ev + sealed)) * 100));
  const keepPct = 100 - ripPct;
  if (ev > sealed * 1.3) {
    verdictEl.textContent = '🔥 RIP IT!';
    verdictEl.className = 'verdict rip';
  } else if (ev > sealed) {
    verdictEl.textContent = '✂️ Slight edge to rip';
    verdictEl.className = 'verdict rip';
  } else if (sealed > ev * 1.3) {
    verdictEl.textContent = '💎 KEEP SEALED';
    verdictEl.className = 'verdict keep';
  } else {
    verdictEl.textContent = '🤷 Coin flip';
    verdictEl.className = 'verdict';
  }
  barEl.innerHTML = `<div class="bar-rip" style="width:${ripPct}%"></div><div class="bar-keep" style="width:${keepPct}%"></div>`;
  detailsEl.innerHTML = `Sealed: ¥${sealed.toLocaleString()}<br>Opening EV: ¥${ev.toFixed(0).toLocaleString()}<br>Difference: ¥${(ev - sealed).toFixed(0).toLocaleString()}`;
  resultEl.classList.add('show');
}
</script>
<footer><a href="../">← Price Guide</a> | <a href="ev-calculator.html">EV Calculator</a></footer>
<footer id="site-footer"></footer>
<script src="/japan-tcg-price-guide/components/footer.js"></script>
</body>
</html>
