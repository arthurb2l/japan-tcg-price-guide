<meta charset="UTF-8">

<title>Pokemon Pack EV Calculator | Is This Pack Worth It?</title>
<meta name="description" content="Calculate expected value of Japanese Pokemon booster packs. Enter pack price and chase card values to see if it's worth buying.">

<style>
h1{text-align:center;color:#222;font-size:1.5em;margin:20px 0}
.breadcrumb{font-size:.85em;margin-bottom:15px}
.calc{background:#fff;border-radius:12px;padding:20px;margin:20px 0;border:1px solid #ddd}
label{display:block;margin:15px 0 5px;color:#222;font-weight:500}
input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#222;font-size:1em}
input:focus{outline:none;border-color:#D81111}
button{width:100%;padding:14px;background:#D81111;color:#fff;border:none;border-radius:6px;font-size:1.1em;font-weight:bold;cursor:pointer;margin-top:20px}
button:hover{background:#cc1212}
.result{background:#f9f9f9;border-radius:8px;padding:20px;margin-top:20px;text-align:center;display:none;border:1px solid #ddd}
.result.show{display:block}
.ev{font-size:2em;font-weight:bold}
.ev.good{color:#166534}
.ev.bad{color:#D81111}
.ev.neutral{color:#92400e}
.verdict{margin-top:10px;font-size:1.1em}
.formula{color:#666;font-size:.8em;margin-top:15px}
footer{text-align:center;padding:20px;color:#666;font-size:.8em}
</style>
<link rel="icon" href="/japan-tcg-price-guide/favicon.svg">
</head>
<body>
<script src="/japan-tcg-price-guide/components/header.js"></script>
<div class="breadcrumb"><a href="../">← Back to Price Guide</a></div>
<h1>🎰 Pack EV Calculator</h1>
<div class="calc">
<label>Pack Price (¥)</label>
<input type="number" id="packPrice" placeholder="180" value="180">
<label>Chase Card Value (¥)</label>
<input type="number" id="chaseValue" placeholder="50000">
<label>Chase Card Pull Rate (1 in X packs)</label>
<input type="number" id="pullRate" placeholder="300" value="300">
<label>Average Bulk Value per Pack (¥)</label>
<input type="number" id="bulkValue" placeholder="20" value="20">
<button onclick="calculate()">Calculate EV</button>
<div class="result" id="result">
<div class="ev" id="evValue">¥0</div>
<div class="verdict" id="verdict"></div>
<div class="formula" id="formula"></div>
</div>
</div>
<script>
function calculate() {
  const pack = parseFloat(document.getElementById('packPrice').value) || 0;
  const chase = parseFloat(document.getElementById('chaseValue').value) || 0;
  const rate = parseFloat(document.getElementById('pullRate').value) || 1;
  const bulk = parseFloat(document.getElementById('bulkValue').value) || 0;
  const ev = (chase / rate) + bulk;
  const roi = ((ev - pack) / pack * 100).toFixed(0);
  const evEl = document.getElementById('evValue');
  const verdictEl = document.getElementById('verdict');
  const formulaEl = document.getElementById('formula');
  const resultEl = document.getElementById('result');
  evEl.textContent = '¥' + ev.toFixed(0);
  evEl.className = 'ev ' + (ev > pack * 1.2 ? 'good' : ev < pack * 0.8 ? 'bad' : 'neutral');
  if (ev > pack * 1.5) verdictEl.textContent = '🔥 Great value! Buy these packs.';
  else if (ev > pack) verdictEl.textContent = '✅ Positive EV. Worth buying.';
  else if (ev > pack * 0.8) verdictEl.textContent = '😐 Break-even. Only if you enjoy opening.';
  else verdictEl.textContent = '❌ Negative EV. Skip or buy singles.';
  formulaEl.textContent = `EV = (¥${chase} ÷ ${rate}) + ¥${bulk} = ¥${ev.toFixed(0)} | ROI: ${roi}%`;
  resultEl.classList.add('show');
}
</script>
<h2 style="color:#ffd700;margin:30px 0 15px;font-size:1.2em">📊 Try Real Examples</h2>
<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">
<button onclick="preset(180,80000,288,15)" style="width:auto;padding:10px 14px;font-size:.9em">Pokemon 151</button>
<button onclick="preset(180,120000,324,20)" style="width:auto;padding:10px 14px;font-size:.9em">Eevee Heroes</button>
<button onclick="preset(180,45000,180,25)" style="width:auto;padding:10px 14px;font-size:.9em">Terastal Fest</button>
<button onclick="preset(220,300000,432,10)" style="width:auto;padding:10px 14px;font-size:.9em">OP-01 (Shanks)</button>
<button onclick="preset(220,150000,288,15)" style="width:auto;padding:10px 14px;font-size:.9em">PRB-01</button>
<button onclick="preset(220,80000,216,20)" style="width:auto;padding:10px 14px;font-size:.9em">OP-04 (Roger)</button>
</div>
<script>
function preset(pack,chase,rate,bulk){
document.getElementById('packPrice').value=pack;
document.getElementById('chaseValue').value=chase;
document.getElementById('pullRate').value=rate;
document.getElementById('bulkValue').value=bulk;
calculate();
}
</script>
