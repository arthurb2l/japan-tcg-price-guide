<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Scan Card | PokePiece</title>
<link rel="stylesheet" href="/japan-tcg-price-guide/base.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:#000;color:#fff;font-family:system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* Camera fills screen */
.camera-area{flex:1;position:relative;overflow:hidden}
video{width:100%;height:100%;object-fit:cover}
canvas{display:none}

/* Card frame overlay */
.frame-overlay{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center}
.card-frame{position:relative;width:62%;max-width:260px;aspect-ratio:2.5/3.5;border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.5)}
.corner{position:absolute;width:18px;height:18px}
.corner.tl{top:-1px;left:-1px;border-top:3px solid #4CAF50;border-left:3px solid #4CAF50;border-radius:3px 0 0 0}
.corner.tr{top:-1px;right:-1px;border-top:3px solid #4CAF50;border-right:3px solid #4CAF50;border-radius:0 3px 0 0}
.corner.bl{bottom:-1px;left:-1px;border-bottom:3px solid #4CAF50;border-left:3px solid #4CAF50;border-radius:0 0 0 3px}
.corner.br{bottom:-1px;right:-1px;border-bottom:3px solid #4CAF50;border-right:3px solid #4CAF50;border-radius:0 0 3px 0}

/* Guidance text */
.guidance{position:absolute;top:max(env(safe-area-inset-top),12px);left:0;right:0;text-align:center;pointer-events:none}
.guidance span{background:rgba(0,0,0,.6);padding:6px 14px;border-radius:20px;font-size:.8em;color:#fff}

/* Bottom bar ã always visible over camera */
.bottom-bar{position:absolute;bottom:0;left:0;right:0;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(transparent,rgba(0,0,0,.85) 30%);display:flex;flex-direction:column;gap:8px;z-index:5}

/* Result strip */
.result-strip{display:none;background:#1a1a1a;border-radius:10px;padding:10px;gap:10px;align-items:center;min-height:70px}
.result-strip.show{display:flex}
.result-strip img{width:50px;height:70px;border-radius:4px;object-fit:contain;flex-shrink:0}
.result-strip .info{flex:1;min-width:0}
.result-strip .info h4{margin:0;font-size:.85em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-strip .info p{margin:1px 0;color:#999;font-size:.72em}
.result-strip .price-col{text-align:right;flex-shrink:0}
.result-strip .price-col .price{color:#4CAF50;font-size:1.1em;font-weight:bold}
.result-strip .price-col .more{color:#888;font-size:.7em;cursor:pointer;pointer-events:auto}

/* Controls row */
.ctrl-row{display:flex;align-items:center;justify-content:space-between;padding:4px 8px}
.tcg-sel{display:flex;background:#222;border-radius:16px;overflow:hidden}
.tcg-sel button{padding:6px 12px;border:none;background:none;color:#666;font-size:.75em;cursor:pointer}
.tcg-sel button.active{color:#fff;font-weight:600}
.tcg-sel button.pokemon.active{background:#EE1515}
.tcg-sel button.onepiece.active{background:#D70000}
.snap-btn{width:52px;height:52px;border-radius:50%;border:3px solid #fff;background:none;cursor:pointer;position:relative}
.snap-btn::after{content:'';position:absolute;inset:3px;border-radius:50%;background:#fff;transition:background .1s}
.snap-btn:active::after{background:#aaa}
.back-btn{color:#fff;text-decoration:none;font-size:1.2em;width:40px;text-align:center}

/* Loading */
.scan-status{display:none;text-align:center;padding:4px}
.scan-status.show{display:block}
.scan-status span{background:rgba(0,0,0,.6);padding:4px 12px;border-radius:12px;font-size:.75em;color:#aaa}

/* More results overlay */
.more-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:20;display:none;flex-direction:column;padding:16px;padding-top:max(env(safe-area-inset-top),16px);padding-bottom:calc(16px + env(safe-area-inset-bottom));overflow-y:auto}
.more-overlay.show{display:flex}
.more-overlay h3{margin:0 0 12px;font-size:1em;display:flex;justify-content:space-between}
.more-overlay h3 button{background:none;border:none;color:#888;font-size:1em;cursor:pointer}
.alt-card{display:flex;gap:10px;padding:10px;background:#1a1a1a;border-radius:8px;margin-bottom:8px;cursor:pointer;align-items:center}
.alt-card:active{background:#2a2a2a}
.alt-card img{width:45px;height:63px;border-radius:4px;object-fit:contain}
.alt-card .info{flex:1}
.alt-card .info h4{margin:0;font-size:.85em}
.alt-card .info p{margin:1px 0;color:#999;font-size:.72em}
.alt-card .price{color:#4CAF50;font-size:.95em;font-weight:bold;flex-shrink:0}

/* Deal input */
.deal-strip{display:none;align-items:center;gap:8px;padding:6px 10px;background:#111;border-radius:8px;font-size:.82em}
.deal-strip.show{display:flex}
.deal-strip input{background:#222;border:1px solid #444;color:#fff;padding:5px 8px;border-radius:6px;width:80px;font-size:.85em}
.deal-strip .verdict{font-weight:bold}
.deal-strip .verdict.good{color:#4CAF50}
.deal-strip .verdict.bad{color:#ff5252}
.deal-strip .verdict.fair{color:#FFC107}
</style>
</head>
<body>

<div class="camera-area">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="cvs"></canvas>
  <div class="frame-overlay">
    <div class="card-frame">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
  </div>
  <div class="guidance" id="guidance"><span>Select a TCG to start</span></div>

  <div class="bottom-bar">
    <div class="result-strip" id="result-strip"></div>
    <div class="deal-strip" id="deal-strip">
      <span>Shop ôË</span>
      <input type="number" id="shop-price" placeholder="0" oninput="checkDeal()">
      <span class="verdict" id="verdict"></span>
    </div>
    <div class="scan-status" id="scan-status"><span>ReadingãÎ</span></div>
    <div class="ctrl-row">
      <a href="index.html" class="back-btn">ã</a>
      <div class="tcg-sel">
        <button class="pokemon" onclick="pickTcg('pokemon')">ãÀ Pokemon</button>
        <button class="onepiece" onclick="pickTcg('onepiece')">ÞÇãã ÿ¡ One Piece</button>
      </div>
      <button class="snap-btn" onclick="capture()"></button>
    </div>
  </div>
</div>

<div class="more-overlay" id="more-overlay">
  <h3>Other matches <button onclick="closeMore()">ã</button></h3>
  <div id="alt-list"></div>
</div>

<script>
var tcg=localStorage.getItem('scan-tcg')||'',stream=null,cardDb=null,matched=null,lastRaw='',altMatches=[];

function pickTcg(t){
  tcg=t;localStorage.setItem('scan-tcg',t);
  document.querySelectorAll('.tcg-sel button').forEach(function(b){b.classList.remove('active')});
  document.querySelector('.tcg-sel .'+t).classList.add('active');
  setGuide('Place card inside frame');
  loadDb();
}
if(tcg){document.querySelector('.tcg-sel .'+tcg).classList.add('active');loadDb();}
startCam();

function setGuide(msg){document.getElementById('guidance').innerHTML='<span>'+msg+'</span>';}

function startCam(){
  if(stream)return;
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:1920}}})
    .then(function(s){stream=s;document.getElementById('vid').srcObject=s;})
    .catch(function(e){setGuide('Camera access needed');});
}

function loadDb(){
  if(cardDb&&cardDb._tcg===tcg)return;
  setGuide('Loading card dataãÎ');
  if(tcg==='onepiece'){
    fetch('/japan-tcg-price-guide/data/onepiece-cache.json').then(function(r){return r.json()}).then(function(d){
      var cards=[];
      if(d.sets)Object.values(d.sets).forEach(function(s){if(Array.isArray(s))s.forEach(function(c){cards.push(c)})});
      cardDb=cards;cardDb._tcg=tcg;
      setGuide('Place card inside frame');
    });
  }else if(tcg==='pokemon'){
    var shards=['bw','dp','ex','sm','sv','swsh','vintage','xy'],cards=[],loaded=0;
    shards.forEach(function(sh){
      fetch('/japan-tcg-price-guide/data/shards/'+sh+'.json').then(function(r){return r.json()}).then(function(arr){
        if(Array.isArray(arr))arr.forEach(function(c){cards.push(c)});
        loaded++;
        if(loaded===shards.length){cardDb=cards;cardDb._tcg=tcg;setGuide('Place card inside frame');}
      });
    });
  }
}

function capture(){
  if(!tcg){setGuide('Pick Pokemon or One Piece first');return;}
  if(!cardDb){setGuide('Still loadingãÎ');return;}
  var vid=document.getElementById('vid'),cvs=document.getElementById('cvs');
  cvs.width=vid.videoWidth;cvs.height=vid.videoHeight;
  var ctx=cvs.getContext('2d');ctx.drawImage(vid,0,0);

  // Crop card frame region
  var fw=vid.videoWidth*0.62,fh=fw*(3.5/2.5);
  var fx=(vid.videoWidth-fw)/2,fy=(vid.videoHeight-fh)/2;
  if(fy<0)fy=0;if(fh>vid.videoHeight)fh=vid.videoHeight;

  // Crop bottom 18% for card number ã with preprocessing
  var numH=Math.floor(fh*0.18);
  var numCvs=document.createElement('canvas');numCvs.width=Math.floor(fw);numCvs.height=numH;
  var nctx=numCvs.getContext('2d');
  nctx.drawImage(cvs,fx,fy+fh-numH,fw,numH,0,0,fw,numH);

  // Preprocess: grayscale + high contrast + threshold for better OCR
  var imgData=nctx.getImageData(0,0,numCvs.width,numCvs.height);
  var d=imgData.data;
  for(var i=0;i<d.length;i+=4){
    var gray=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
    var v=gray>140?255:0; // binary threshold
    d[i]=d[i+1]=d[i+2]=v;
  }
  nctx.putImageData(imgData,0,0);

  runOcr(numCvs);
}

function runOcr(canvas){
  document.getElementById('scan-status').classList.add('show');
  setGuide('Hold stillãÎ');
  if(!window.Tesseract){
    var s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload=function(){doOcr(canvas)};
    document.head.appendChild(s);
  }else{doOcr(canvas)}
}

function doOcr(canvas){
  Tesseract.recognize(canvas,'eng',{logger:function(){}}).then(function(r){
    document.getElementById('scan-status').classList.remove('show');
    var txt=r.data.text.trim();
    lastRaw=txt;
    matchCard(txt);
  }).catch(function(e){
    document.getElementById('scan-status').classList.remove('show');
    setGuide('Could not read ã try again');
    showStrip(null);
  });
}

function matchCard(raw){
  if(!cardDb||!cardDb.length)return;
  var patterns=[
    /([A-Z]{1,3}\d{1,2})-(\d{2,3})/i,
    /(P-\d{2,3})/i,
    /(\d{3})\s*\/\s*(\d{2,3})/,
    /([A-Z]{2,4}\d{1,2}[a-z]?)\s+(\d{3})/i,
    /(ST-?\d{1,2})-(\d{2,3})/i,
    /(EB-?\d{1,2})-(\d{2,3})/i,
    /(PRB\d{1,2})-(\d{2,3})/i,
  ];
  var cardNum=null;
  for(var i=0;i<patterns.length;i++){
    var m=raw.match(patterns[i]);
    if(m){cardNum=m[0].replace(/\s+/g,'');break;}
  }
  if(!cardNum){setGuide('Could not read number ã try again or move closer');showStrip(null);return;}

  // Find matches with scores
  var matches=[];
  var norm=cardNum.toUpperCase().replace(/[^A-Z0-9\/-]/g,'');
  cardDb.forEach(function(c){
    if(!c.id)return;
    var cid=c.id.toUpperCase().replace(/[^A-Z0-9\/-]/g,'');
    var score=0;
    if(cid===norm)score=1;
    else if(norm.length>3&&cid.indexOf(norm)>=0)score=0.9;
    else if(norm.length>3&&norm.indexOf(cid)>=0&&cid.length>3)score=0.8;
    if(score>0)matches.push({card:c,score:score});
  });

  matches.sort(function(a,b){return b.score-a.score});

  if(matches.length>0){
    matched=matches[0].card;
    altMatches=matches.slice(1,10);
    setGuide('ã Card found');
    showStrip(matches[0].card);
    logMatch(matches[0].card.id,matches[0].score,true);
  }else{
    setGuide('No match for '+cardNum+' ã try again');
    showStrip(null);
    logMatch(null,0,false);
  }
}

function showStrip(card){
  var el=document.getElementById('result-strip');
  var deal=document.getElementById('deal-strip');
  if(!card){el.classList.remove('show');deal.classList.remove('show');matched=null;return;}

  var name=typeof card.name==='object'?(card.name.en||card.name.jp||''):(card.name||'');
  var img=typeof card.img==='object'?(card.img.jp||card.img.en||''):(card.image||card.img||'');
  var price=card.pricing?card.pricing.computed:null;
  var jpy=price?price.jpy:null;
  var set=card.set||'';var rarity=card.rarity||'';var finish=card.finish||'';

  var h='';
  if(img)h+='<img src="'+img+'" alt="">';
  h+='<div class="info">';
  h+='<h4>'+name+'</h4>';
  h+='<p>'+card.id+' ôñ '+set+(rarity?' ôñ '+rarity:'')+(finish&&finish!=='regular'?' ôñ '+finish:'')+'</p>';
  h+='</div>';
  h+='<div class="price-col">';
  if(jpy)h+='<div class="price">ôË'+jpy.toLocaleString()+'</div>';
  else h+='<div style="color:#666;font-size:.8em">No price</div>';
  if(altMatches.length)h+='<div class="more" onclick="showMore()">more results ã¡</div>';
  h+='</div>';

  el.innerHTML=h;el.classList.add('show');
  deal.classList.toggle('show',!!jpy);
  document.getElementById('shop-price').value='';
  document.getElementById('verdict').textContent='';
}

function showMore(){
  var el=document.getElementById('alt-list');
  var h='';
  altMatches.forEach(function(m){
    var c=m.card;
    var name=typeof c.name==='object'?(c.name.en||c.name.jp||''):(c.name||'');
    var img=typeof c.img==='object'?(c.img.jp||c.img.en||''):(c.image||c.img||'');
    var price=c.pricing&&c.pricing.computed?c.pricing.computed.jpy:null;
    var finish=c.finish||'';
    h+='<div class="alt-card" onclick="pickAlt(\''+c.id+'\',\''+encodeURIComponent(finish)+'\')">';
    if(img)h+='<img src="'+img+'" alt="">';
    h+='<div class="info"><h4>'+name+'</h4><p>'+c.id+(finish&&finish!=='regular'?' ôñ '+finish:'')+'</p></div>';
    h+='<div class="price">'+(price?'ôË'+price.toLocaleString():'ã')+'</div>';
    h+='</div>';
  });
  el.innerHTML=h;
  document.getElementById('more-overlay').classList.add('show');
}

function pickAlt(id,finish){
  finish=decodeURIComponent(finish);
  for(var i=0;i<altMatches.length;i++){
    if(altMatches[i].card.id===id&&(altMatches[i].card.finish||'')==finish){
      matched=altMatches[i].card;showStrip(matched);break;
    }
  }
  closeMore();
}

function closeMore(){document.getElementById('more-overlay').classList.remove('show');}

function checkDeal(){
  if(!matched||!matched.pricing||!matched.pricing.computed)return;
  var market=matched.pricing.computed.jpy;if(!market)return;
  var shop=parseInt(document.getElementById('shop-price').value)||0;if(!shop)return;
  var v=document.getElementById('verdict'),ratio=shop/market;
  if(ratio<=0.7){v.textContent='ÞË Great deal!';v.className='verdict good';}
  else if(ratio<=1.0){v.textContent='Þ Fair';v.className='verdict fair';}
  else{v.textContent='Þ Overpriced';v.className='verdict bad';}
}

function logMatch(cardId,confidence,success){
  try{
    if(!window.firebase||!firebase.apps.length){
      if(!window.firebase)return;
      firebase.initializeApp({apiKey:"AIzaSyBx5m2k2NYQOmNMIzBMfpJXnk8AF3K3VYE",authDomain:"japan-tcg-price-guide.firebaseapp.com",projectId:"japan-tcg-price-guide"});
    }
    firebase.firestore().collection('card-recognition-logs').add({
      timestamp:new Date().toISOString(),tcgType:tcg,rawOcrText:lastRaw||'',
      matchedCardId:cardId,confidence:confidence,matched:success,
      userAgent:navigator.userAgent
    });
  }catch(e){}
}
</script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</body>
</html>
