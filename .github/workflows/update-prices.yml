name: Update Prices from API

on:
  schedule:
    - cron: '0 0 1 * *'  # 1st of each month
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch prices and update data
        env:
          POKEMON_API_KEY: ${{ secrets.POKEMON_API_KEY }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const https = require('https');
          
          // === CONFIGURATION ===
          const MAX_CARDS = 100;  // Hard cap - never exceed this (100/day * 30 days = 3000/month buffer)
          const CARDS = [
            // Top chase cards only - add more as needed but stay under MAX_CARDS
            { id: '246723', name: 'Umbreon VMAX Alt Art' },
            { id: '246733', name: 'Rayquaza VMAX Alt Art' },
            { id: '42479', name: 'Charizard Base Set Holo' },
            { id: '264206', name: 'Umbreon VMAX Trainer Gallery' },
          ];
          
          // === SAFEGUARDS ===
          const API_KEY = process.env.POKEMON_API_KEY;
          if (!API_KEY) {
            console.log('⚠️ No API key - skipping');
            process.exit(0);
          }
          
          if (CARDS.length > MAX_CARDS) {
            console.log(`🛑 CARD LIMIT EXCEEDED: ${CARDS.length} > ${MAX_CARDS}`);
            console.log('Edit workflow to increase MAX_CARDS or reduce card list');
            process.exit(1);
          }
          
          console.log(`📊 Fetching ${CARDS.length}/${MAX_CARDS} cards (${Math.round(CARDS.length/MAX_CARDS*100)}% of limit)`);
          
          // === API FETCH ===
          async function fetchPrice(tcgPlayerId) {
            return new Promise((resolve) => {
              const url = `https://www.pokemonpricetracker.com/api/v2/cards?tcgPlayerId=${tcgPlayerId}`;
              const options = { headers: { 'Authorization': `Bearer ${API_KEY}` } };
              
              https.get(url, options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const json = JSON.parse(data);
                    if (json.error) {
                      console.log(`⚠️ API error: ${json.error}`);
                      resolve(null);
                    } else {
                      const price = json.data?.[0]?.prices?.market || null;
                      if (!price) console.log(`⚠️ No price in response: ${JSON.stringify(json).slice(0, 200)}`);
                      resolve(price);
                    }
                  } catch (e) { console.log(`⚠️ Parse error: ${e.message}`); resolve(null); }
                });
              }).on('error', () => resolve(null));
            });
          }
          
          async function main() {
            let results = [];
            
            for (const card of CARDS) {
              const price = await fetchPrice(card.id);
              if (price) {
                console.log(`✅ ${card.name}: $${price}`);
                results.push({ ...card, market_usd: price, updated: new Date().toISOString().split('T')[0] });
              } else {
                console.log(`❌ ${card.name}: failed`);
              }
            }
            
            // Write results
            if (results.length > 0) {
              const output = { 
                last_updated: new Date().toISOString().split('T')[0],
                source: 'PokemonPriceTracker API (auto)',
                card_limit: MAX_CARDS,
                cards: results 
              };
              fs.writeFileSync('data/api-prices.json', JSON.stringify(output, null, 2));
              console.log(`\n✅ Updated ${results.length} prices`);
            }
          }
          
          main().catch(e => { console.log('Error:', e.message); process.exit(1); });
          SCRIPT
          
      - name: Commit if changed
        run: |
          if [ ! -f data/api-prices.json ]; then
            echo "⚠️ No price data fetched — skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/api-prices.json
          git diff --staged --quiet || git commit -m "Auto-update prices from API 🤖"
          git pull --rebase origin main || true
          git push || echo "Push failed, skipping"
