name: Detect New One Piece Sets

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6am UTC (3pm JST)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new sets
        run: |
          # Fetch current series from official JP site
          JP_SERIES=$(curl -s -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "User-Agent: Mozilla/5.0 (Japan-TCG-Price-Guide)" \
            -d "series=550101" \
            "https://www.onepiece-cardgame.com/cardlist/" \
            | grep -oP 'value="\K55\d+' | sort -u)

          JP_COUNT=$(echo "$JP_SERIES" | wc -l)
          echo "JP series on official site: $JP_COUNT"

          # Fetch current series from official EN site
          EN_SERIES=$(curl -s -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "User-Agent: Mozilla/5.0 (Japan-TCG-Price-Guide)" \
            -d "series=569101" \
            "https://en.onepiece-cardgame.com/cardlist/" \
            | grep -oP 'value="\K56\d+' | sort -u)

          EN_COUNT=$(echo "$EN_SERIES" | wc -l)
          echo "EN series on official site: $EN_COUNT"

          # Compare against cache
          CACHE_SETS=$(node -e "
            const d = JSON.parse(require('fs').readFileSync('data/onepiece-cache.json','utf8'));
            console.log(Object.keys(d.sets).filter(s => s !== 'DON').length);
          ")
          echo "Sets in cache: $CACHE_SETS"

          # Check for new JP series not in cache
          NEW_SETS=""
          for SID in $JP_SERIES; do
            # Extract set code from the page for this series
            CODE=$(curl -s -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -H "User-Agent: Mozilla/5.0" \
              -d "series=$SID" \
              "https://www.onepiece-cardgame.com/cardlist/" \
              | grep -oP '<dl class="modalCol" id="\K[^"_]+' | head -1 | sed 's/[0-9]*$//' | sed 's/\(.*[A-Z]\)/\1/')

            if [ -n "$CODE" ]; then
              # Normalize: OP07 -> OP-07
              NORM=$(echo "$CODE" | sed 's/\([A-Z]\+\)\([0-9]\)/\1-\2/')
              EXISTS=$(node -e "
                const d = JSON.parse(require('fs').readFileSync('data/onepiece-cache.json','utf8'));
                console.log(d.sets['$NORM'] ? 'yes' : 'no');
              ")
              if [ "$EXISTS" = "no" ]; then
                NEW_SETS="$NEW_SETS $NORM($SID)"
              fi
            fi
            sleep 1
          done

          if [ -n "$NEW_SETS" ]; then
            echo "NEW_SETS_FOUND=true" >> $GITHUB_ENV
            echo "NEW_SETS=$NEW_SETS" >> $GITHUB_ENV
            echo "🆕 New sets detected:$NEW_SETS"
          else
            echo "NEW_SETS_FOUND=false" >> $GITHUB_ENV
            echo "✅ No new sets detected"
          fi

      - name: Create issue for new sets
        if: env.NEW_SETS_FOUND == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const newSets = process.env.NEW_SETS.trim();
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `New One Piece sets detected: ${newSets}`,
              body: `## Auto-detected new sets\n\nThe weekly scan found sets on the official Bandai cardlist that are not in our cache:\n\n${newSets.split(' ').map(s => '- ' + s).join('\n')}\n\n### Action needed\n\`\`\`bash\nnode scripts/fetch-op-official-cardlist.js --all --lang jp --update\nnode scripts/fetch-op-official-cardlist.js --all --lang en --update\n\`\`\`\n\nThen push the updated cache.\n\n_Auto-generated by detect-new-sets workflow_`,
              labels: ['enhancement', 'auto-detected']
            });
