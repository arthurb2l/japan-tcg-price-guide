<style>
.container { max-width: 900px; margin: 0 auto; }
h1 { text-align: center; color: #222; font-size: 1.6em; margin: 15px 0 5px; }
.subtitle { text-align: center; color: #666; margin-bottom: 15px; font-size: 0.9em; }

/* Nav matching Pokemon page */
.nav { display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; }
.nav a { background: #fff; color: #222; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 0.85em; border: 1px solid #ddd; }
.nav a:hover { background: #EE1515; color: #fff; border-color: #EE1515; }

/* Filters */
.filters { display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; }
.filter-btn { padding: 8px 16px; border: 2px solid #222; border-radius: 20px; cursor: pointer; font-size: 0.85em; transition: all 0.2s; background: #fff; color: #222; }
.filter-btn:hover { background: #eee; }
.filter-btn.active { background: #222; color: #fff; }
.filter-pokemon.active { background: #EE1515; border-color: #EE1515; color: #fff; }
.filter-onepiece.active { background: #FFD700; border-color: #FFD700; color: #222; }

/* Calendar Header */
.calendar-header { display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
.month-nav { display: flex; align-items: center; gap: 10px; }
.month-nav button { background: #fff; border: 2px solid #222; color: #222; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
.month-nav button:hover { background: #222; color: #fff; }
.month-title { font-size: 1.3em; font-weight: bold; min-width: 160px; text-align: center; }

/* Calendar Grid */
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #ddd; border-radius: 8px; overflow: hidden; border: 2px solid #222; }
.day-header { background: #222; color: #fff; padding: 8px; text-align: center; font-size: 0.75em; font-weight: bold; }
.day { background: #fff; min-height: 80px; padding: 4px; position: relative; }
.day.other-month { background: #f0f0f0; }
.day.today { box-shadow: inset 0 0 0 2px #EE1515; }
.day-number { font-size: 0.8em; color: #666; margin-bottom: 3px; }
.day.today .day-number { color: #EE1515; font-weight: bold; }

/* Release items */
.release-dot { padding: 2px 4px; border-radius: 4px; font-size: 0.65em; margin-bottom: 2px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid; }
.release-dot.pokemon { background: #fee2e2; color: #EE1515; border-color: #EE1515; }
.release-dot.onepiece { background: #fef3c7; color: #92400e; border-color: #FFD700; }
.release-dot:hover { opacity: 0.8; }

/* Detail panel */
.detail-panel { background: #fff; border-radius: 8px; padding: 15px; margin-top: 15px; display: none; border: 2px solid #999; }
.detail-panel.active { display: block; }
.detail-panel .detail-tag-past { background: #f3f4f6; color: #666; border-color: #999; display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 0.75em; border: 1px solid; margin-right: 4px; }
.detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.detail-title { font-size: 1.1em; font-weight: bold; color: #222; }
.detail-close { background: none; border: none; color: #666; font-size: 1.5em; cursor: pointer; line-height: 1; }
.detail-close:hover { color: #EE1515; }
.detail-jp { color: #7c3aed; font-weight: bold; margin-bottom: 8px; }
.detail-meta { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 8px; font-size: 0.9em; color: #666; }
.detail-price { color: #EE1515; font-weight: bold; }
.detail-tag { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 0.75em; border: 1px solid; }
.detail-tag.pokemon { background: #fee2e2; color: #EE1515; border-color: #EE1515; }
.detail-tag.onepiece { background: #fef3c7; color: #92400e; border-color: #FFD700; }
.detail-tag.booster { background: #dbeafe; color: #1d4ed8; border-color: #1d4ed8; }
.detail-tag.deck { background: #f3e8ff; color: #7c3aed; border-color: #7c3aed; }
.detail-tag.special { background: #dcfce7; color: #166534; border-color: #166534; }
.detail-tag.lottery { background: #fce7f3; color: #be185d; border-color: #be185d; }
.release-dot.lottery { background: #fce7f3; color: #be185d; border-color: #be185d; font-style: italic; }
.release-dot.event { background: #dcfce7; color: #166534; border-color: #166534; font-weight: bold; }
.detail-tag.event { background: #dcfce7; color: #166534; border-color: #166534; }

/* Upcoming list */
.upcoming { margin-top: 20px; }
.upcoming h2 { font-size: 1em; margin-bottom: 10px; color: #222; padding: 8px 12px; background: #222; color: #fff; border-radius: 4px; }
.upcoming-list { display: flex; flex-direction: column; gap: 6px; }
.upcoming-item { background: #fff; padding: 10px 12px; border-radius: 8px; display: flex; flex-direction: column; cursor: pointer; border: 1px solid #ddd; }
.upcoming-item:hover { border-color: #EE1515; }
.upcoming-header { display: flex; justify-content: space-between; align-items: center; }
.upcoming-left { display: flex; align-items: center; gap: 10px; }
.upcoming-date { font-size: 0.8em; color: #666; min-width: 50px; }
.upcoming-name { font-size: 0.9em; }
.upcoming-right { display: flex; align-items: center; gap: 6px; }
.upcoming-detail { display: none; padding: 10px 0 0; border-top: 1px solid #eee; margin-top: 10px; font-size: 0.85em; color: #444; line-height: 1.6; }
.upcoming-item.expanded { border-color: #EE1515; }
.upcoming-item.expanded .upcoming-detail { display: block; }
.upcoming-detail-jp { color: #7c3aed; font-weight: bold; margin-bottom: 4px; }
.upcoming-detail-meta { color: #666; }
.upcoming-detail-meta strong { color: #EE1515; }
.upcoming-detail-link { margin-top: 6px; }
.upcoming-detail-link a { color: #EE1515; font-weight: bold; text-decoration: none; }

/* Footer */
.freshness { text-align: center; margin-top: 20px; font-size: 0.8em; color: #666; }
.freshness a { color: #EE1515; }

/* Countdown */
.countdown { background: #fff; border: 2px solid #222; border-radius: 8px; padding: 12px; margin-bottom: 15px; text-align: center; }
.countdown-label { font-size: 0.8em; color: #666; }
.countdown-name { font-weight: bold; margin: 4px 0; }
.countdown-timer { font-size: 1.3em; color: #EE1515; font-weight: bold; }
.countdown-jp { color: #7c3aed; font-size: 0.85em; }

@media (max-width: 600px) {
  .day { min-height: 60px; }
  .release-dot { font-size: 0.55em; padding: 1px 3px; }
  .day-number { font-size: 0.7em; }
  .nav a { padding: 6px 10px; font-size: 0.75em; }
}

<script>
const releases = [

  { date: '2026-04-24', name: 'BASE SHOP Playmat SKYPIEA', jp: 'BASE SHOPリミテッドプレイマットvol.1-SKYPIEA-', tcg: 'onepiece', type: 'accessory', price: '¥4,730' },
  { date: '2026-05-30', name: 'Decisive Battle [OP-16]', jp: 'ブースターパック 決戦の刻【OP-16】', tcg: 'onepiece', type: 'booster', price: '¥220/pack' },
  { date: '2026-07-11', name: 'New Starter Decks (6 types)', jp: 'スタートデッキ ST-31〜ST-36', tcg: 'onepiece', type: 'deck', price: '¥550 each', desc: 'Luffy, Zoro, Kuzan, Katakuri, Sabo, Kid. ⚠️ Date unverified' },
  // EN releases
  { date: '2026-04-03', name: 'OP15-EB04 EN Release', jp: '神の島の冒険 英語版', tcg: 'onepiece', type: 'booster', price: '$4.99/pack', desc: 'English combined set OP-15 + EB-04' },

  { date: '2026-09-01', name: 'Heroines Special Set EN', jp: 'ONE PIECE Heroines Special Set', tcg: 'onepiece', type: 'special', price: '$70.00' },
  { date: '2026-09-01', name: 'Live Action Ed. vol.2 EN', jp: 'Live Action Edition vol.2', tcg: 'onepiece', type: 'special', price: '$20.00 each', desc: 'Baroque Works + Straw Hat Crew versions' },
  // POKEMON 2026
  { date: '2026-01-23', name: 'Munikus Zero', jp: 'ムニキスゼロ', tcg: 'pokemon', type: 'booster', price: '¥180/pack' },
  { date: '2026-03-13', name: 'Ninja Spinner', jp: 'ニンジャスピナー', tcg: 'pokemon', type: 'booster', price: '¥180/pack' },
  // Abyss Eye - confirmed May 22 (sources: pokeguardian, nipponfigures, screenrant)
  { date: '2026-05-22', name: 'Abyss Eye', jp: 'アビスアイ', tcg: 'pokemon', type: 'booster', price: '¥180/pack', desc: 'Mega Darkrai ex featured. Lottery dates TBD.' },
  // Storm Emeralda - confirmed July 31 (sources: pokeguardian, screenrant)
  { date: '2026-07-31', name: 'Storm Emeralda', jp: 'ストームエメラルダ', tcg: 'pokemon', type: 'booster', price: '¥180/pack', desc: 'Mega Rayquaza ex featured. Lottery dates TBD.' },
  { date: '2026-09-16', name: '30th Celebration', jp: '30th セレブレーション', tcg: 'pokemon', type: 'special', price: 'TBA', desc: '30th Anniversary set. Worldwide simultaneous release.' },
];

let currentDate = new Date();
let currentFilter = 'all';
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  document.getElementById('monthTitle').textContent = `${months[month]} ${year}`;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  
  let html = days.map(d => `<div class="day-header">${d}</div>`).join('');
  for (let i = firstDay - 1; i >= 0; i--) {
    html += `<div class="day other-month"><div class="day-number">${daysInPrevMonth - i}</div></div>`;
  }
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const dayReleases = releases.filter(r => r.date === dateStr && (currentFilter === 'all' || r.tcg === currentFilter));
    let releasesHtml = dayReleases.map(r => 
      `<div class="release-dot ${r.tcg}" onclick="showDetail('${r.date}','${r.name}')">${r.name.substring(0,10)}</div>`
    ).join('');
    html += `<div class="day${isToday ? ' today' : ''}"><div class="day-number">${day}</div>${releasesHtml}</div>`;
  }
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  for (let day = 1; day <= totalCells - (firstDay + daysInMonth); day++) {
    html += `<div class="day other-month"><div class="day-number">${day}</div></div>`;
  }
  document.getElementById('calendar').innerHTML = html;
  renderUpcoming();
}

function renderUpcoming() {
  const today = new Date().toISOString().split('T')[0];
  const upcoming = releases.filter(r => r.date >= today && (currentFilter === 'all' || r.tcg === currentFilter)).sort((a,b) => a.date.localeCompare(b.date));
  document.getElementById('upcomingList').innerHTML = upcoming.map((r, i) => {
    const d = new Date(r.date);
    const link = r.link ? `<div class="upcoming-detail-link"><a href="${r.link}" target="_blank" rel="noopener">🔗 Open Link</a></div>` : '';
    return `<div class="upcoming-item" id="upcoming-${i}" data-date="${r.date}" data-name="${r.name}" onclick="toggleUpcoming(${i})">
      <div class="upcoming-header">
        <div class="upcoming-left"><span class="upcoming-date">${d.getMonth()+1}/${d.getDate()}</span><span class="upcoming-name">${r.name}</span></div>
        <div class="upcoming-right"><span class="detail-tag ${r.tcg}">${r.tcg === 'pokemon' ? 'PKM' : 'OP'}</span><span class="detail-tag ${r.type}">${r.type}</span></div>
      </div>
      <div class="upcoming-detail">
        <div class="upcoming-detail-jp">${r.jp}</div>
        <div class="upcoming-detail-meta">${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} · <strong>${r.price}</strong></div>
        ${r.desc ? '<div>' + r.desc + '</div>' : ''}
        ${link}
      </div>
    </div>`;
  }).join('') || '<p style="color:#666;font-size:0.85em;padding:10px;">No upcoming releases</p>';
}

function changeMonth(delta) { currentDate.setMonth(currentDate.getMonth() + delta); renderCalendar(); }
function filterReleases(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filter-${filter}`).classList.add('active');
  renderCalendar();
  updateCountdown();
}
function showDetail(date, name) {
  const today = new Date().toISOString().split('T')[0];
  // Future events: scroll to and expand in upcoming list
  if (date >= today) {
    const items = document.querySelectorAll('.upcoming-item');
    for (const item of items) {
      if (item.dataset.date === date && item.dataset.name === name) {
        const idx = item.id.replace('upcoming-', '');
        toggleUpcoming(parseInt(idx));
        item.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }
    }
  }
  // Past events: show in detail panel below calendar
  const r = releases.find(x => x.date === date && x.name === name);
  if (!r) return;
  const d = new Date(r.date);
  document.getElementById('detailTitle').textContent = r.name;
  document.getElementById('detailJp').textContent = r.jp;
  document.getElementById('detailDate').textContent = `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  document.getElementById('detailPrice').textContent = r.price;
  document.getElementById('detailTags').innerHTML = `<span class="detail-tag-past">Past</span> <span class="detail-tag ${r.tcg}">${r.tcg === 'pokemon' ? 'Pokemon' : 'One Piece'}</span> <span class="detail-tag ${r.type}">${r.type}</span>`;
  document.getElementById('detailDesc').textContent = r.desc || '';
  const linkEl = document.getElementById('detailLink');
  if (r.link) { linkEl.innerHTML = `<a href="${r.link}" target="_blank" rel="noopener" style="color:#EE1515;font-weight:bold">🔗 Open Link</a>`; linkEl.style.display = 'block'; }
  else { linkEl.style.display = 'none'; }
  const panel = document.getElementById('detailPanel');
  panel.classList.add('active');
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
function toggleUpcoming(idx) {
  const item = document.getElementById('upcoming-' + idx);
  if (!item) return;
  const wasExpanded = item.classList.contains('expanded');
  document.querySelectorAll('.upcoming-item.expanded').forEach(el => el.classList.remove('expanded'));
  if (!wasExpanded) item.classList.add('expanded');
}
function closeDetail() { document.querySelectorAll('.upcoming-item.expanded').forEach(el => el.classList.remove('expanded')); }

function updateCountdown() {
  const today = new Date().toISOString().split('T')[0];
  const next = releases.filter(r => r.date >= today && r.type !== 'lottery' && (currentFilter === 'all' || r.tcg === currentFilter))
    .sort((a,b) => a.date.localeCompare(b.date))[0];
  if (!next) { document.getElementById('countdown').style.display = 'none'; return; }
  
  const releaseDate = new Date(next.date + 'T00:00:00');
  const now = new Date();
  const diff = releaseDate - now;
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  
  document.getElementById('countdown').innerHTML = `
    <div class="countdown-label">⏱️ Next Release</div>
    <div class="countdown-name">${next.name}</div>
    <div class="countdown-jp">${next.jp}</div>
    <div class="countdown-timer">${days}d ${hours}h</div>
  `;
  document.getElementById('countdown').style.display = 'block';
}

renderCalendar();
updateCountdown();
setInterval(updateCountdown, 60000);
</script>
