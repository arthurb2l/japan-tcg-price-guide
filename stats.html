<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PQLCGRZB0E"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Collection Stats - PokePiece</title>
  <link rel="stylesheet" href="/japan-tcg-price-guide/base.css">
  <style>
    .container{max-width:800px;margin:0 auto;padding:20px}
    h1{font-size:1.5em;margin-bottom:20px}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-bottom:30px}
    .stat-card{background:#fff;border-radius:12px;padding:20px;text-align:center}
    .stat-card .value{font-size:2em;font-weight:700}
    .stat-card .label{font-size:.85em;color:#666;margin-top:5px}
    .chart-section{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px}
    .chart-section h2{font-size:1em;margin-bottom:15px}
    .bar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .bar-label{width:100px;font-size:.85em}
    .bar-track{flex:1;height:20px;background:#eee;border-radius:10px;overflow:hidden}
    .bar-fill{height:100%;border-radius:10px}
    .bar-value{width:50px;font-size:.85em;text-align:right}
    .empty{text-align:center;padding:40px;color:#666}
  </style>
</head>
<body>
<header id="site-header"></header>
<div class="container">
  <h1>📊 Collection Stats</h1>
  <div id="content"></div>
</div>
<footer id="site-footer"></footer>
<script src="/japan-tcg-price-guide/components/header.js"></script>
<script src="/japan-tcg-price-guide/components/footer.js"></script>
<script>
async function loadStats() {
  const coll = JSON.parse(localStorage.getItem('tcg_inventory') || '{}');
  const ids = Object.keys(coll);
  
  if (!ids.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No cards in collection yet.<br><br>Add cards to see your stats!</div>';
    return;
  }
  
  const [pk, op] = await Promise.all([
    fetch('/japan-tcg-price-guide/data/pokemon.json').then(r => r.json()),
    fetch('/japan-tcg-price-guide/data/onepiece.json').then(r => r.json())
  ]);
  const cardMap = Object.fromEntries([...pk, ...op].map(c => [c.id, c]));
  
  const cards = ids.map(id => cardMap[id]).filter(Boolean);
  const getPrice = c => c.pricing?.usd || c.pricing?.tcgplayer?.normal?.marketPrice || 0;
  
  // Stats
  const totalCards = ids.reduce((sum, id) => sum + (coll[id]?.qty || 1), 0);
  const totalValue = cards.reduce((sum, c) => sum + getPrice(c) * (coll[c.id]?.qty || 1), 0);
  const pkCount = cards.filter(c => c.game === 'pokemon').length;
  const opCount = cards.filter(c => c.game === 'onepiece').length;
  
  // Rarity breakdown
  const rarities = {};
  cards.forEach(c => { rarities[c.rarity || 'Unknown'] = (rarities[c.rarity || 'Unknown'] || 0) + 1; });
  const topRarities = Object.entries(rarities).sort((a,b) => b[1] - a[1]).slice(0, 6);
  const maxRarity = Math.max(...topRarities.map(r => r[1]));
  
  document.getElementById('content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="value">${totalCards}</div><div class="label">Total Cards</div></div>
      <div class="stat-card"><div class="value">${ids.length}</div><div class="label">Unique Cards</div></div>
      <div class="stat-card"><div class="value" style="color:#2e7d32">¥${Math.round(totalValue * 150).toLocaleString()}</div><div class="label">Est. Value</div></div>
      <div class="stat-card"><div class="value" style="color:#EE1515">${pkCount}</div><div class="label">Pokemon</div></div>
      <div class="stat-card"><div class="value" style="color:#E4002B">${opCount}</div><div class="label">One Piece</div></div>
    </div>
    
    <div class="chart-section">
      <h2>By Rarity</h2>
      ${topRarities.map(([rarity, count]) => `
        <div class="bar">
          <div class="bar-label">${rarity}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${count/maxRarity*100}%;background:linear-gradient(90deg,#6366f1,#8b5cf6)"></div></div>
          <div class="bar-value">${count}</div>
        </div>
      `).join('')}
    </div>
  `;
}
loadStats();
</script>
</body>
</html>
