<script>
const _s = JSON.parse(localStorage.getItem('tcg_settings') || '{}');

function getPriceSources(c) {
  if (!c.pricing) return [];
  const s = [];
  if (c.pricing.usd) s.push({ jpy: Math.round(c.pricing.usd * 150) });
  if (c.pricing.tcgplayer?.normal?.marketPrice) s.push({ jpy: Math.round(c.pricing.tcgplayer.normal.marketPrice * 150) });
  else if (c.pricing.tcgplayer?.holofoil?.marketPrice) s.push({ jpy: Math.round(c.pricing.tcgplayer.holofoil.marketPrice * 150) });
  if (c.pricing.cardmarket?.trend) s.push({ jpy: Math.round(c.pricing.cardmarket.trend * 162) });
  if (c.pricing.amazonjp?.jpy) s.push({ jpy: c.pricing.amazonjp.jpy });
  if (c.pricing.mercari?.jpy) s.push({ jpy: c.pricing.mercari.jpy });
  // Regional JP sources (new v2 pricing)
  if (c.pricing.sources) {
    for (const [src, data] of Object.entries(c.pricing.sources)) {
      if (data?.jpy) s.push({ jpy: data.jpy, source: src });
    }
  }
  // Fallback: computed.jpy
  if (!s.length && c.pricing.computed?.jpy) s.push({ jpy: c.pricing.computed.jpy });
  return s;
}
function getFloorJpy(c) {
  const s = getPriceSources(c);
  if (!s.length) return 0;
  const jpys = s.map(x => x.jpy).sort((a,b) => a - b);
  return jpys[0]; // floor = lowest source
}
let allCards = [], filteredCards = [], currentView = _s.searchView || 'grid', currency = 'JPY', currentGame = 'pokemon';
let collFilterActive = false;
let currentModalCard = null; // Currently displayed card in modal
let globalLang = ''; // '', 'jp', or 'en'
let pricePhotos = {}; // Japan price photos
const rarityOrder = ['Common','Uncommon','Rare','Double Rare','Ultra Rare','Illustration Rare','Special Art Rare','Hyper Rare','Shiny Rare','ACE SPEC Rare',
  'C','UC','R','SR','SEC','L','SP','P','DON!!','Promo']; // One Piece rarities
// Static rates - JPY base (primary currency for Japan tourists)
const rates = { JPY: 1, USD: 0.0067, EUR: 0.0062 };

let currentUser = null;
let userCollection = {}; // Single source of truth - inventory with list flags

// Collection Store - Flag-based architecture (unified with collection.html)
// Cards stored in inventory with lists.wishlist/lists.tradelist flags
const collectionStore = {
  // localStorage uses single inventory key
  _local() { return JSON.parse(localStorage.getItem('tcg_inventory') || '{}'); },
  _saveLocal(data) { localStorage.setItem('tcg_inventory', JSON.stringify(data)); },
  
  async add(cardId, list = 'inventory') {
    if (!userCollection[cardId]) {
      userCollection[cardId] = { qty: 1, addedAt: Date.now(), lists: {} };
    }
    if (list !== 'inventory') {
      userCollection[cardId].lists = userCollection[cardId].lists || {};
      userCollection[cardId].lists[list] = true;
    }
    
    if (currentUser) {
      await db.collection('users').doc(currentUser.uid).collection('inventory').doc(cardId).set(userCollection[cardId], { merge: true });
    } else {
      this._saveLocal(userCollection);
    }
    this._updateCount();
  },
  
  async remove(cardId, list = 'inventory') {
    if (list === 'inventory') {
      // Remove from inventory entirely
      delete userCollection[cardId];
      if (currentUser) {
        await db.collection('users').doc(currentUser.uid).collection('inventory').doc(cardId).delete();
      }
    } else {
      // Just remove the list flag
      if (userCollection[cardId]?.lists) {
        userCollection[cardId].lists[list] = false;
      }
      if (currentUser && userCollection[cardId]) {
        await db.collection('users').doc(currentUser.uid).collection('inventory').doc(cardId).update({ lists: userCollection[cardId].lists });
      }
    }
    if (!currentUser) this._saveLocal(userCollection);
    this._updateCount();
  },
  
  has(cardId, list = 'inventory') {
    if (list === 'inventory') return !!userCollection[cardId];
    return !!(userCollection[cardId]?.lists?.[list]);
  },
  
  inAnyList(cardId) {
    return !!userCollection[cardId];
  },
  
  async toggle(cardId, list = 'inventory') {
    this.has(cardId, list) ? await this.remove(cardId, list) : await this.add(cardId, list);
    return this.has(cardId, list);
  },
  
  count(list = 'inventory') {
    if (list === 'inventory') return Object.keys(userCollection).length;
    return Object.values(userCollection).filter(c => c.lists?.[list]).length;
  },
  
  getAll(list = 'inventory') {
    if (list === 'inventory') return userCollection;
    const filtered = {};
    for (const [id, card] of Object.entries(userCollection)) {
      if (card.lists?.[list]) filtered[id] = card;
    }
    return filtered;
  },
  
  _updateCount() { document.getElementById('coll-count').textContent = this.count('inventory'); }
};

async function loadUserCollection(uid) {
  userCollection = {};
  
  try {
    // Load from unified inventory collection (new format with flags)
    const invSnapshot = await db.collection('users').doc(uid).collection('inventory').get();
    invSnapshot.forEach(doc => { 
      userCollection[doc.id] = doc.data();
      // Ensure lists object exists
      if (!userCollection[doc.id].lists) userCollection[doc.id].lists = {};
    });
    
    // Migration: Also check old separate collections for orphan cards
    const [wishSnapshot, tradeSnapshot] = await Promise.all([
      db.collection('users').doc(uid).collection('wishlist').get(),
      db.collection('users').doc(uid).collection('tradelist').get()
    ]);
    
    let migratedCount = 0;
    const batch = db.batch();
    
    // Migrate wishlist orphans
    wishSnapshot.forEach(doc => {
      if (!userCollection[doc.id]) {
        // Orphan card - promote to inventory with wishlist flag
        userCollection[doc.id] = { qty: 1, addedAt: Date.now(), lists: { wishlist: true } };
        batch.set(db.collection('users').doc(uid).collection('inventory').doc(doc.id), userCollection[doc.id]);
        migratedCount++;
      } else if (!userCollection[doc.id].lists?.wishlist) {
        // Card exists but missing wishlist flag
        userCollection[doc.id].lists = userCollection[doc.id].lists || {};
        userCollection[doc.id].lists.wishlist = true;
        batch.update(db.collection('users').doc(uid).collection('inventory').doc(doc.id), { lists: userCollection[doc.id].lists });
        migratedCount++;
      }
    });
    
    // Migrate tradelist orphans
    tradeSnapshot.forEach(doc => {
      if (!userCollection[doc.id]) {
        userCollection[doc.id] = { qty: 1, addedAt: Date.now(), lists: { tradelist: true } };
        batch.set(db.collection('users').doc(uid).collection('inventory').doc(doc.id), userCollection[doc.id]);
        migratedCount++;
      } else if (!userCollection[doc.id].lists?.tradelist) {
        userCollection[doc.id].lists = userCollection[doc.id].lists || {};
        userCollection[doc.id].lists.tradelist = true;
        batch.update(db.collection('users').doc(uid).collection('inventory').doc(doc.id), { lists: userCollection[doc.id].lists });
        migratedCount++;
      }
    });
    
    if (migratedCount > 0) {
      await batch.commit();
      console.log(`Migrated ${migratedCount} cards from old format`);
    }
  } catch(e) {
    console.error('Load error:', e);
    // Fallback to localStorage
    userCollection = collectionStore._local();
  }
  
  collectionStore._updateCount();
  renderCards();
}

async function migrateLocalToCloud(uid) {
  // Migrate localStorage to cloud (unified format)
  const local = JSON.parse(localStorage.getItem('tcg_inventory') || '{}');
  const cardIds = Object.keys(local);
  if (cardIds.length === 0) return;
  
  const batch = db.batch();
  const ref = db.collection('users').doc(uid).collection('inventory');
  
  cardIds.forEach(cardId => {
    const card = local[cardId];
    batch.set(ref.doc(cardId), {
      qty: card.qty || 1,
      addedAt: card.addedAt || Date.now(),
      lists: card.lists || {}
    }, { merge: true });
  });
  
  await batch.commit();
  localStorage.removeItem('tcg_inventory');
  showToast(`Migrated ${cardIds.length} cards to cloud`);
}

function formatPrice(card) {
  const jpy = getFloorJpy(card);
  if (!jpy) return '-';
  if (currency === 'USD') return '$' + (jpy / 150).toFixed(2);
  if (currency === 'EUR') return '€' + (jpy / 162).toFixed(2);
  return '¥' + jpy.toLocaleString();
}

async function loadCards() {
  // Load saved currency
  const settings = JSON.parse(localStorage.getItem('tcg_settings') || '{}');
  const saved = settings.currency || localStorage.getItem('tcg-currency');
  if (saved) { currency = saved; document.getElementById('currency').value = saved; }
  
  try {
    // Try sharded data first, fallback to monolithic
    let pokemonCards = [];
    try {
      const manifest = await fetch('data/shards/manifest.json').then(r => r.json());
      const shardPromises = Object.values(manifest.shards).map(s => 
        fetch(`data/shards/${s.file}`).then(r => r.json())
      );
      const shards = await Promise.all(shardPromises);
      pokemonCards = shards.flatMap(s => Object.values(s.sets).flat()).map(c => ({...c, setId: c.setId || c.set, game: 'pokemon'}));
    } catch(e) {
      // Fallback to monolithic
      const pokemonRes = await fetch('data/brain-cache.json');
      const pokemonData = await pokemonRes.json();
      pokemonCards = Object.values(pokemonData.sets).flat().map(c => ({...c, game: 'pokemon'}));
    }
    
    // Load One Piece cards
    let opCards = [];
    try {
      const opRes = await fetch('data/onepiece-cache.json');
      const opData = await opRes.json();
      opCards = deduplicateOPCards(Object.values(opData.sets).flat().map(c => ({...normalizeOPCard(c), game: 'onepiece'})));
    } catch(e) { console.log('No One Piece data'); }
    
    // Load price photos
    try {
      const ppRes = await fetch('data/price-photos.json');
      const ppData = await ppRes.json();
      pricePhotos = ppData.photos || {};
    } catch(e) { console.log('No price photos'); }
    
    allCards = [...pokemonCards, ...opCards];
    allCards.forEach((c, i) => c._uid = i);
    console.log(`Loaded ${allCards.length} cards (${pokemonCards.length} PKM + ${opCards.length} OP)`);
    
    // Populate set filter (respects game filter)
    // Check URL params
    const params = new URLSearchParams(location.search);
    if (params.get('game')) filterByGame(params.get('game'));
    else filterByGame(currentGame);
    
    // Set finish filter from URL
    if (params.get('finish')) {
      document.getElementById('finish-filter').value = params.get('finish');
    }
    
    if (params.get('q')) {
      document.getElementById('search').value = params.get('q');
      doSearch();
    } else if (params.get('set')) {
      const setParam = params.get('set');
      const setFilter = document.getElementById('set-filter');
      const hasOption = [...setFilter.options].some(o => o.value === setParam);
      console.log('Set filter debug:', {setParam, hasOption, optionCount: setFilter.options.length, currentValue: setFilter.value});
      if (hasOption) {
        setFilter.value = setParam;
        filterBySet(setParam);
      } else {
        console.warn('Set not found in dropdown:', setParam);
        filteredCards = getGameCards().filter(c => c.setId === setParam);
        sortCards(document.getElementById('sort').value);
        updateURL();
      }
    } else if (params.get('random')) {
      const gameCards = getGameCards();
      const card = gameCards[Math.floor(Math.random() * gameCards.length)];
      showCard(card.id);
      filteredCards = gameCards;
      applyFilters();
      renderCards();
    } else {
      filteredCards = getGameCards();
      applyFilters();
      renderCards();
    }
    updateStats();
  } catch (e) {
    console.error('Card load failed:', e);
    document.getElementById('stats').textContent = `Error loading cards: ${e.message}. Try refreshing.`;
  }
}

let displayLimit = 60;

function updateStats() {
  let cards = filteredCards;
  if (collFilterActive) {
    const coll = collectionStore.getAll();
    cards = cards.filter(c => coll[c.id]);
  }
  const total = cards.length;
  const showing = Math.min(total, displayLimit);
  const activeSet = document.getElementById('set-filter')?.value || '';
  let label = total + ' cards';
  if (activeSet) {
    const native = cards.filter(c => c.id.replace('-','').toLowerCase().startsWith(activeSet.replace('-','').toLowerCase())).length;
    const reprints = total - native;
    if (reprints > 0) label = native + ' cards + ' + reprints + ' reprints';
  }
  document.getElementById('stats').textContent = 
    label + (total > displayLimit ? ` (showing ${showing})` : '');
  document.getElementById('show-more-container').style.display = 
    total > displayLimit ? 'block' : 'none';
}

function showMore() {
  displayLimit += 60;
  renderCards();
  updateStats();
}

function renderCards() {
  const grid = document.getElementById('results');
  const noResults = document.getElementById('no-results');
  
  // Filter by collection FIRST if active
  let cards = filteredCards;
  if (collFilterActive) {
    const coll = collectionStore.getAll();
    cards = cards.filter(c => coll[c.id]);
  }
  
  // Then apply display limit
  cards = cards.slice(0, displayLimit);
  
  if (!cards.length) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';
  
  const proxyImg = url => url?.includes('onepiece-cardgame.com') ? `https://wsrv.nl/?url=${encodeURIComponent(url)}` : url;
  // Global lang: prefer requested lang if card has it, else fallback
  const getCardImg = c => {
    const jp = proxyImg(c.imgJp || c.img) || (c.game === 'onepiece' ? proxyImg(c.img) : c.image + '/low.webp');
    const en = c.imgEn ? proxyImg(c.imgEn) : null;
    if (globalLang === 'en' && en) return en;
    if (globalLang === 'jp') return jp;
    return jp; // default
  };
  const getImg = c => getCardImg(c) || 'onepiece/images/card-back.png';
  const getImgHigh = c => proxyImg(c.imgJp || c.img) || (c.game === 'onepiece' ? proxyImg(c.img) : c.image + '/high.webp') || 'onepiece/images/card-back.png';
  const imgErr = "this.style.opacity='0.3';this.style.background='#ddd'";
  const jpName = c => c.nameJp ? `<span style="color:#7c3aed;font-size:.8em"> ${c.nameJp}</span>` : '';
  const variant = c => c.variant ? `<span style="color:#888;font-size:.85em"> (${c.variant})</span>` : '';
  const owned = c => collectionStore.inAnyList(c.id) ? ' owned' : '';
  const collBtn = c => `<div class="coll-dot"></div><div class="coll-add" onclick="showListMenu(event,'${c.id}')">+</div>`;
  // Flip button shows opposite of current display
  const flipBtn = c => {
    if (!c.imgEn) return '';
    const showingEn = globalLang === 'en';
    return `<button class="flip-tile" onclick="flipTile(event,this)" data-jp="${proxyImg(c.imgJp||c.img)}" data-en="${proxyImg(c.imgEn)}">${showingEn ? 'JP' : 'EN'}</button>`;
  };
  
  const isFoil = c => c.finish && c.finish !== 'regular' ? ' foil' : '';
  const getFinishSuffix = c => {
    if (!c.finish || c.finish === 'regular') return '';
    const m = c.finish.match(/^(parallel|reprint|alternate)[-_]?(\d+)?/);
    if (!m) return '';
    const p = m[1] === 'parallel' ? 'P' : m[1] === 'reprint' ? 'R' : 'AA';
    return '·' + p + (m[2] || '');
  };
  const finishLabel = c => {
    if (c.variant) return c.variant;
    if (!c.finish) return '?';
    if (c.finish === 'regular') return 'Regular';
    if (c.finish === 'alternate-art') return 'Alt Art';
    if (c.finish.startsWith('parallel')) return c.finish.replace('parallel-','Parallel ');
    return c.finish;
  };
  
  const activeSet = document.getElementById('set-filter')?.value || '';
  const isReprint = c => activeSet && !c.id.replace('-','').toLowerCase().startsWith(activeSet.replace('-','').toLowerCase());
  const reprintLabel = c => {
    if (!isReprint(c)) return '';
    const lbl = (c.finish?.startsWith('reprint') || c.finish === 'regular') ? 'Reprint' : 'From';
    return `<div class="set" style="color:#e67e22;font-size:.65em">${lbl}: ${activeSet}</div>`;
  };

  if (currentView === 'checklist') {
    grid.innerHTML = `<div class="card-item header">
        <span></span>
        <span class="name" onclick="sortCards('name')">Name ▼</span>
        <span class="set" onclick="sortCards('set')">Set ▼</span>
        <span class="id" onclick="sortCards('id')">ID ▼</span>
        <span class="finish" onclick="sortCards('finish')">Finish ▼</span>
        <span class="rarity" onclick="sortCards('rarity')">Rarity ▼</span>
        <span class="price" onclick="sortCards('price-high')">Price ▼</span>
      </div>` + cards.map(c => `
      <div class="card-item${owned(c)}" onclick="showCard('${c.id}',false,${c._uid})">
        <img src="${getImg(c)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="${imgErr}">
        <span class="name">${c.name}${jpName(c)}</span>
        <span class="set">${c.set || c.setId}</span>
        <span class="id">${c.id}${getFinishSuffix(c)}</span>
        <span class="finish">${finishLabel(c)}</span>
        <span class="rarity">${c.rarity || '-'}</span>
        <span class="price">${formatPrice(c)}</span>
      </div>
    `).join('');
  } else if (currentView === 'text') {
    grid.innerHTML = cards.map(c => `
      <div class="card-item${owned(c)}" onclick="showCard('${c.id}',false,${c._uid})">
        <div class="name">${c.name}${jpName(c)}${c.pricing ? ' · ' + formatPrice(c) : ''}</div>
        <div class="set">${c.set || c.setId} · ${c.id}${getFinishSuffix(c)} · ${c.rarity || 'Unknown rarity'}${variant(c)} · ${finishLabel(c)}</div>
        <div class="details">${c.types ? 'Type: ' + c.types.join(', ') : ''} ${c.hp ? '· HP: ' + c.hp : ''}</div>
      </div>
    `).join('');
  } else if (currentView === 'full') {
    grid.innerHTML = cards.map(c => `
      <div class="card-item${owned(c)}${isFoil(c)}" onclick="if(!toggleCardSelect('${c.id}',this))showCardFromTile(this,'${c.id}',${c._uid})">
        ${collBtn(c)}${flipBtn(c)}
        <img src="${getImgHigh(c)}" alt="${c.name}" loading="lazy" referrerpolicy="no-referrer" onerror="${imgErr}">
        <div class="info">
          <div class="name">${c.name}${jpName(c)}</div>
          <div class="meta">${c.set || c.setId} · ${c.id}${getFinishSuffix(c)} · ${c.rarity || 'Unknown'}${variant(c)} · ${finishLabel(c)}</div>
          ${c.types ? '<div class="types">' + c.types.map(t => '<span class="type-badge">' + t + '</span>').join('') + '</div>' : ''}
          ${c.hp ? '<div class="meta">HP: ' + c.hp + '</div>' : ''}
          ${c.pricing ? '<div class="price">' + formatPrice(c) + '</div>' : ''}
        </div>
      </div>
    `).join('');
  } else {
    grid.innerHTML = cards.map(c => `
      <div class="card-item${owned(c)}${isFoil(c)}" onclick="if(!toggleCardSelect('${c.id}',this))showCardFromTile(this,'${c.id}',${c._uid})">
        ${collBtn(c)}${flipBtn(c)}
        <img src="${getImg(c)}" alt="${c.name}" loading="lazy" referrerpolicy="no-referrer">
        <div class="name">${c.name}${jpName(c)}</div>
        <div class="set">${c.id}${getFinishSuffix(c)}${variant(c)}</div>
        ${reprintLabel(c)}
        ${c.pricing ? '<div class="price">' + formatPrice(c) + '</div>' : ''}
      </div>
    `).join('');
  }
  updateStats();
}

function doSearch() {
  // Track search history
  const q = document.getElementById("search").value.trim();
  if (q.length > 2) {
    const hist = JSON.parse(localStorage.getItem("tcg_search_history") || "[]");
    const filtered = hist.filter(h => h !== q).slice(0, 9);
    filtered.unshift(q);
    localStorage.setItem("tcg_search_history", JSON.stringify(filtered));
  }
  displayLimit = 60;
  const query = document.getElementById('search').value.toLowerCase().trim();
  if (!query) { filteredCards = getGameCards(); sortCards(document.getElementById('sort').value); updateURL(); return; }
  
  // Normalize query: "st16 003" or "st16003" -> "st16-003"
  const normalizedQuery = query.replace(/([a-z]+)(\d+)\s*(\d+)/i, '$1$2-$3').replace(/\s+/g, '-');
  
  const gameCards = getGameCards();
  filteredCards = gameCards.filter(c => {
    const idNorm = c.id?.toLowerCase().replace(/-/g, '');
    const queryNorm = query.replace(/[\s-]/g, '');
    const finish = c.finish || '';
    const suffixMatch = query.match(/[·.]?p(\d+)$/) ? finish === 'parallel-' + query.match(/[·.]?p(\d+)$/i)[1] :
                        query.match(/[·.]?r(\d+)$/) ? finish === 'reprint-' + query.match(/[·.]?r(\d+)$/i)[1] :
                        query.match(/[·.]?aa$/) ? (finish === 'alternate-art' || finish === 'parallel-1') : false;
    return c.name?.toLowerCase().includes(query) ||
      c.id?.toLowerCase().includes(query) ||
      c.id?.toLowerCase().includes(normalizedQuery) ||
      idNorm?.includes(queryNorm) ||
      c.localId?.toLowerCase().includes(query) ||
      c.set?.toLowerCase().includes(query) ||
      c.setId?.toLowerCase().includes(query) ||
      suffixMatch;
  });
  
  // Smart switch: if no results in current game, check other game
  if (!filteredCards.length) {
    const otherGame = currentGame === 'pokemon' ? 'onepiece' : 'pokemon';
    const otherCards = allCards.filter(c => c.game === otherGame);
    const otherResults = otherCards.filter(c => 
      c.name?.toLowerCase().includes(query) ||
      c.id?.toLowerCase().includes(query) ||
      c.localId?.toLowerCase().includes(query)
    );
    if (otherResults.length) {
      filterByGame(otherGame);
      filteredCards = otherResults;
    }
  }
  
  document.getElementById('set-filter').value = '';
  applyFilters();
  sortCards(document.getElementById('sort').value);
  updateURL();
}

function updateURL() {
  const q = document.getElementById('search').value.trim();
  const set = document.getElementById('set-filter').value;
  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (set) params.set('set', set);
  if (currentGame !== 'pokemon') params.set('game', currentGame);
  const finish = document.getElementById('finish-filter')?.value;
  if (finish) params.set('finish', finish);
  const url = params.toString() ? '?' + params.toString() : location.pathname;
  history.replaceState(null, '', url);
}

function applyFilters() {
  const setId = document.getElementById('set-filter').value;
  const finish = document.getElementById('finish-filter')?.value;
  const color = document.getElementById('color-filter')?.value;
  const type = document.getElementById('type-filter')?.value;
  const cost = document.getElementById('cost-filter')?.value;
  const power = document.getElementById('power-filter')?.value;
  
  // Only reset to all cards if no search query active
  const query = document.getElementById('search').value.trim();
  let cards = query ? filteredCards : getGameCards();
  
  // Set filter
  if (setId) cards = cards.filter(c => c.setId === setId);
  
  // Finish filter
  if (finish === 'regular') cards = cards.filter(c => c.finish === 'regular' || !c.finish);
  else if (finish === 'parallel') cards = cards.filter(c => c.finish?.startsWith('parallel'));
  else if (finish === 'alternate-art') cards = cards.filter(c => c.finish === 'alternate-art');
  else if (finish === 'foil') cards = cards.filter(c => c.finish && c.finish !== 'regular');
  
  // One Piece specific filters
  if (color) cards = cards.filter(c => c.color === color);
  if (type) cards = cards.filter(c => c.type === type);
  if (cost) {
    if (cost === '6') cards = cards.filter(c => c.cost >= 6);
    else cards = cards.filter(c => c.cost === parseInt(cost));
  }
  if (power) {
    if (power === '7000') cards = cards.filter(c => c.power >= 7000);
    else cards = cards.filter(c => c.power === parseInt(power));
  }
  
  filteredCards = cards;
  sortCards(document.getElementById('sort').value);
  updateURL();
}

function sortCards(by) {
  const getPrice = c => getFloorJpy(c);
  // Sort by full ID with numeric comparison for the number part
  const sortById = (a, b) => {
    const baseA = (a.id || '').replace(/[-_]\d+$/, ''), baseB = (b.id || '').replace(/[-_]\d+$/, '');
    const numA = parseInt((a.id || '').match(/-(\d+)/)?.[1] || '0'), numB = parseInt((b.id || '').match(/-(\d+)/)?.[1] || '0');
    if (numA !== numB) return numA - numB;
    const fa = finishOrder.indexOf(a.finish) === -1 ? 99 : finishOrder.indexOf(a.finish);
    const fb = finishOrder.indexOf(b.finish) === -1 ? 99 : finishOrder.indexOf(b.finish);
    if (fa !== fb) return fa - fb;
    return (a.id || '').localeCompare(b.id || '', undefined, {numeric: true});
  };
  const finishOrder = ['regular','parallel-1','parallel-2','parallel-3','parallel-4','parallel-5','parallel-6','parallel-7','alternate-art'];
  filteredCards.sort((a, b) => {
    if (by === 'name') return (a.name || '').localeCompare(b.name || '');
    if (by === 'id') return sortById(a, b);
    if (by === 'set') return (a.setId || '').localeCompare(b.setId || '') || sortById(a, b);
    if (by === 'finish') {
      const ai = finishOrder.indexOf(a.finish) === -1 ? 99 : finishOrder.indexOf(a.finish);
      const bi = finishOrder.indexOf(b.finish) === -1 ? 99 : finishOrder.indexOf(b.finish);
      return ai - bi;
    }
    if (by === 'rarity') {
      const ai = rarityOrder.indexOf(a.rarity) === -1 ? 99 : rarityOrder.indexOf(a.rarity);
      const bi = rarityOrder.indexOf(b.rarity) === -1 ? 99 : rarityOrder.indexOf(b.rarity);
      return bi - ai;
    }
    if (by === 'price-high') return getPrice(b) - getPrice(a);
    if (by === 'price-low') return (getPrice(a) || 999999) - (getPrice(b) || 999999);
    return 0;
  });
  renderCards();
}

function filterByGame(game) {
  currentGame = game;
  displayLimit = 60;
  document.querySelectorAll('.game-tab').forEach(t => t.classList.toggle('active', t.dataset.game === game));
  
  // Show/hide One Piece specific filters
  const isOP = game === 'onepiece';
  document.querySelectorAll('.op-filter').forEach(el => el.style.display = isOP ? '' : 'none');
  if (!isOP) {
    document.getElementById('color-filter').value = '';
    document.getElementById('type-filter').value = '';
    document.getElementById('cost-filter').value = '';
    document.getElementById('power-filter').value = '';
  }
  
  // Update set filter to only show sets from selected game
  const setFilter = document.getElementById('set-filter');
  const currentSet = setFilter.value;
  setFilter.innerHTML = '<option value="">All Sets</option>';
  
  const gameCards = game === 'all' ? allCards : allCards.filter(c => c.game === game);
  const sets = [...new Set(gameCards.map(c => c.setId))].sort((a, b) => {
    const normalize = s => s.replace(/(\d+)/g, n => n.padStart(3, '0'));
    return normalize(a).localeCompare(normalize(b));
  });
  sets.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    const setName = gameCards.find(c => c.setId === s)?.set;
    opt.textContent = setName && setName !== s ? `${s} - ${setName}` : s;
    setFilter.appendChild(opt);
  });
  
  // Re-apply current search/filter
  if (document.getElementById('search').value) {
    doSearch();
  } else if (currentSet && sets.includes(currentSet)) {
    setFilter.value = currentSet;
    filterBySet(currentSet);
  } else {
    setFilter.value = '';
    filteredCards = gameCards;
    sortCards(document.getElementById('sort').value);
    updateURL();
  }
}

// Price history
let priceHistory = null;
async function loadPriceHistory() {
  if (priceHistory) return;
  try {
    const files = await fetch(BASE + "/data/price-history/index.json").then(r => r.json());
    priceHistory = {};
    for (const f of files.slice(-7)) { // Last 7 days
      const data = await fetch(BASE + "/data/price-history/" + f).then(r => r.json());
      priceHistory[data.date] = { ...data.onepiece, ...data.pokemon };
    }
  } catch(e) { priceHistory = {}; }
}

function showPriceHistory(cardId) {
  const histLabel = document.getElementById("modal-history-label");
  const hist = document.getElementById("modal-history");
  if (!priceHistory || Object.keys(priceHistory).length < 2) {
    histLabel.style.display = hist.style.display = "none";
    return;
  }
  const dates = Object.keys(priceHistory).sort();
  const prices = dates.map(d => priceHistory[d][cardId]?.usd || priceHistory[d][cardId]?.eur).filter(Boolean);
  if (prices.length < 2) {
    histLabel.style.display = hist.style.display = "none";
    return;
  }
  const first = prices[0], last = prices[prices.length-1];
  const change = ((last - first) / first * 100).toFixed(1);
  const arrow = change > 0 ? "↑" : change < 0 ? "↓" : "";
  const color = change > 0 ? "#22c55e" : change < 0 ? "#ef4444" : "#666";
  hist.innerHTML = `<span style="color:${color}">${arrow}${Math.abs(change)}% (${dates.length}d)</span>`;
  histLabel.style.display = hist.style.display = "";
}

function checkRateLimit() {
  const now = Date.now(), key = 'tcg_report_times';
  let times = JSON.parse(localStorage.getItem(key) || '[]').filter(t => now - t < 3600000);
  if (times.length >= 5) return false;
  times.push(now);
  localStorage.setItem(key, JSON.stringify(times));
  return true;
}
function showReportToast(msg, isError) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {position:'fixed',bottom:'20px',left:'50%',transform:'translateX(-50%)',background:isError?'#d32f2f':'#16a34a',color:'#fff',padding:'12px 20px',borderRadius:'8px',fontSize:'.9em',zIndex:'2000',transition:'opacity .5s',fontWeight:'500'});
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3000);
}
async function submitReport() {
  const type = document.getElementById('report-type').value;
  if (!type) { showReportToast('Please select an issue type', true); return; }
  if (!checkRateLimit()) { showReportToast('Too many reports — try again later', true); return; }
  if (!currentModalCard) return;
  const c = currentModalCard;
  try {
    await db.collection('card-reports').add({
      cardId: c.id, cardName: typeof c.name === 'object' ? (c.name.en || c.name.jp || '') : (c.name || ''),
      game: c.game || currentGame, set: c.set || c.setId || '',
      issueType: type, comment: document.getElementById('report-comment').value || '',
      reportedAt: firebase.firestore.FieldValue.serverTimestamp(),
      deviceId: getDeviceId(), status: 'open'
    });
    document.getElementById('report-form').style.display = 'none';
    showReportToast('✅ Report received — thanks for helping improve the guide!');
  } catch(e) { console.error('Report failed:', e); showReportToast('Failed to submit — please try again', true); }
}
