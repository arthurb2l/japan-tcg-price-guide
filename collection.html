<style>
:root{
  /* Brand */
  --pk:#EE1515;--op:#D70000;
  /* Grays */
  --g1:#222;--g2:#444;--g3:#666;--g4:#999;--g5:#ddd;--g6:#f5f5f5;
  /* Semantic */
  --success:#16a34a;--warn:#f59e0b;--danger:#ef4444;--info:#4285f4;
  /* Surfaces */
  --bg:#f9f9f9;--card:#fff;--border:#e5e5e5;
  /* Spacing */
  --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:20px;--s6:24px;--s8:32px;
  /* Radius */
  --r-sm:4px;--r-md:8px;--r-lg:12px;
  /* Type */
  --t-xs:.75em;--t-sm:.82em;--t-base:.9em;--t-md:1em;--t-lg:1.2em;--t-xl:1.5em;
  /* Shadow */
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.12);
}
.nav{background:var(--card);border-bottom:1px solid #ddd;padding:10px 15px;margin:-10px -10px 0;display:flex;align-items:center;gap:15px;flex-wrap:wrap}
.nav a{color:var(--g3);text-decoration:none;font-size:.9em}
.nav a:hover{color:var(--pk)}
.page-header{display:flex;justify-content:space-between;align-items:center;margin:20px 0;flex-wrap:wrap;gap:15px}
.page-title{font-size:1.5em;font-weight:700}
.auth-section{display:flex;align-items:center;gap:10px}
.auth-btn{background:var(--card);border:1px solid var(--border);padding:8px 16px;border-radius:var(--r-md);cursor:pointer;font-size:.85em;display:flex;align-items:center;gap:8px}
.auth-btn:hover{border-color:var(--info);color:var(--info)}
.auth-btn img{width:18px;height:18px}
.user-info{display:flex;align-items:center;gap:10px}
.user-info img{width:32px;height:32px;border-radius:50%}
.signout-btn{background:none;border:none;color:var(--g3);cursor:pointer;font-size:.8em}
.signout-btn:hover{color:var(--pk)}

/* Stats cards */
.stats-row{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap}
.stat-card{background:var(--card);border-radius:var(--r-md);padding:10px 14px;text-align:center;box-shadow:var(--shadow-sm);flex:1 1 calc(33% - 8px);min-width:90px}
.stat-card .value{font-size:1.1em;font-weight:700;color:var(--g1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-card .label{font-size:.75em;color:var(--g3);margin-top:2px}
.stat-card.total .value{color:var(--success)}

/* Set completion */
.set-progress{display:flex;flex-direction:column;gap:8px}
.set-row{display:flex;align-items:center;gap:12px;background:var(--card);padding:10px 14px;border-radius:var(--r-md);box-shadow:var(--shadow-sm)}
.set-name{font-weight:600;font-size:.85em;min-width:100px}
.set-bar{flex:1;height:8px;background:var(--g5);border-radius:4px;overflow:hidden}
.set-bar div{height:100%;border-radius:4px;transition:width .3s}
.set-pct{font-size:.8em;color:var(--g3);white-space:nowrap;min-width:90px;text-align:right}

/* Add-card */
.add-card-bar{margin-bottom:15px}
.add-card-bar input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r-md);font-size:.9em;box-sizing:border-box}
.add-card-bar input:focus{outline:none;border-color:var(--pk)}
.add-suggestions{display:none;background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-md);max-height:320px;overflow-y:auto;margin-top:4px}
.add-suggestions.show{display:block}
.add-sug{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border)}
.add-sug:last-child{border-bottom:none}
.add-sug:hover,.add-sug.highlighted{background:var(--g6)}
.add-sug img{width:40px;height:56px;object-fit:cover;border-radius:var(--r-sm);flex-shrink:0}
.add-sug .s-name{flex:1;font-size:.85em;line-height:1.3}
.add-sug .s-name small{color:var(--g4)}
.add-sug .s-price{font-size:.85em;font-weight:600;text-align:right;white-space:nowrap}

/* List tabs */
.list-tabs{display:flex;gap:5px;margin-bottom:20px;flex-wrap:wrap}
.list-tab{padding:8px 14px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--card);cursor:pointer;font-size:.85em;font-weight:500;transition:all .15s;line-height:1.2}
.list-tab:hover{border-color:var(--g4)}
.list-tab.active{border-color:var(--pk);background:var(--pk);color:#fff}
.list-tab.wishlist.active{border-color:var(--warn);background:var(--warn)}
.list-tab.tradelist.active{border-color:#3b82f6;background:#3b82f6}
.list-tab .count{font-size:.8em;opacity:.8;margin-left:5px}
.util-btn{padding:8px 14px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--card);cursor:pointer;font-size:.85em;font-weight:500;display:inline-flex;align-items:center;gap:4px;line-height:1.2;text-decoration:none;color:inherit;font-family:inherit}
.util-btn:hover{background:var(--g6);border-color:var(--g4)}
.util-row{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap}

/* TCG selector — same visual as list-tab for consistency */
.tcg-selector{display:flex;gap:5px;margin-bottom:20px;flex-wrap:wrap}
.tcg-btn{padding:8px 14px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--card);cursor:pointer;font-size:.85em;font-weight:500;transition:all .15s;line-height:1.2;font-family:inherit;color:inherit}
.tcg-btn:hover{border-color:var(--g4)}
.tcg-btn.active{border-color:var(--pk);background:var(--pk);color:#fff}

/* Filters */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center;justify-content:space-between}
.filter-left{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-label{font-size:.8em;color:var(--g3)}
select.filter{padding:8px 12px;border:1px solid var(--border);border-radius:var(--r-md);font-size:.85em}
.export-btn{margin-left:auto;background:var(--g1);color:#fff;border:none;padding:8px 16px;border-radius:var(--r-md);cursor:pointer;font-size:.85em}
.export-btn:hover{background:var(--g2)}

/* Card grid */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.card-item{background:var(--card);border-radius:var(--r-md);padding:8px;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .15s;position:relative}
.card-item:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.card-item img{width:100%;border-radius:var(--r-sm)}
.card-item .name{font-weight:600;font-size:.8em;margin-top:6px;line-height:1.2}
.card-item .meta{font-size:.7em;color:var(--g3);margin-top:2px}
.card-item .price{font-size:.8em;color:#2a7;font-weight:600;margin-top:4px}
.card-item .remove-btn{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:14px;opacity:0;transition:opacity .15s}
.card-item:hover .remove-btn{opacity:1}
.card-item .remove-btn:hover{background:var(--pk)}
.card-item .qty-badge{position:absolute;top:4px;left:4px;background:var(--g1);color:#fff;font-size:.7em;padding:2px 6px;border-radius:var(--r-lg);font-weight:600}
.card-item .condition-badge{position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:.65em;padding:2px 5px;border-radius:var(--r-md);font-weight:600}
.card-item .condition-badge.nm{background:#22c55e;color:#fff}
.card-item .condition-badge.lp{background:#84cc16;color:#fff}
.card-item .condition-badge.mp{background:var(--warn);color:#fff}
.card-item .condition-badge.hp{background:var(--danger);color:#fff}
.card-item .condition-badge.dmg{background:#7f1d1d;color:#fff}
.card-item .qty-controls{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);display:flex;gap:4px;opacity:0;transition:opacity .15s}
.card-item:hover .qty-controls{opacity:1}
.qty-btn{background:rgba(0,0,0,0.7);color:#fff;border:none;width:24px;height:24px;border-radius:var(--r-sm);cursor:pointer;font-size:14px}
.qty-btn:hover{background:var(--g2)}

/* View toggle */
.view-toggle{display:flex;gap:5px}
.view-btn{background:var(--card);border:1px solid var(--border);padding:6px 12px;border-radius:var(--r-md);cursor:pointer;font-size:.8em}
.view-btn.active{background:var(--g1);color:#fff;border-color:var(--g1)}

/* List view */
.card-list{display:none}
.card-list.active{display:block}
.card-grid.hidden{display:none}
.card-list table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-sm)}
.card-list th,.card-list td{padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);font-size:.85em}
.card-list th{background:var(--g6);font-weight:600;cursor:pointer;white-space:nowrap;user-select:none}
.card-list th:hover{background:#e8e8e8}
.card-list th.sorted{color:var(--pk)}
.card-list th .sort-icon{margin-left:4px;opacity:0.5}
.card-list th.sorted .sort-icon{opacity:1}
.card-list tr{cursor:pointer}
.card-list tr:hover{background:var(--bg)}
.card-list img{width:32px;height:45px;object-fit:cover;border-radius:var(--r-sm)}
.card-list .qty-cell{display:flex;align-items:center;gap:4px}
.card-list .qty-btn{width:22px;height:22px;border:1px solid var(--border);background:var(--card);border-radius:var(--r-sm);cursor:pointer;font-size:.9em;line-height:1;color:#333}
.card-list .qty-btn:hover{background:#f0f0f0;border-color:var(--g4);color:#000}
.card-list .qty-val{min-width:20px;text-align:center;font-weight:600}
.card-list .cond-select,.card-list .lang-select{padding:3px 6px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:.8em;background:var(--card);cursor:pointer}
.card-list .list-icons{display:flex;gap:4px}
.card-list .list-icon{width:24px;height:24px;border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;font-size:.7em;display:flex;align-items:center;justify-content:center;background:var(--card)}
.card-list .list-icon:hover{background:#f0f0f0}
.card-list .list-icon.active{background:#e8f5e9;border-color:var(--success)}
.card-list .detail-btn{text-decoration:none;cursor:pointer;font-size:1em;padding:4px;min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center}
.card-list .delete-btn{background:none;border:none;cursor:pointer;color:var(--g4);font-size:1em;padding:4px}
.card-list .delete-btn:hover{color:var(--danger)}

/* Card modal */
.card-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.card-modal-overlay.show{display:flex}
.card-modal{background:var(--card);border-radius:var(--r-lg);max-width:500px;width:100%;max-height:90vh;overflow-y:auto}
.card-modal-header{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;border-bottom:1px solid var(--border)}
.card-modal-header h3{margin:0;font-size:1.1em}
.card-modal-close{background:none;border:none;font-size:1.5em;cursor:pointer;color:var(--g3)}
.card-modal-body{padding:20px}
.card-modal-img{text-align:center;margin-bottom:20px}
.card-modal-img img{max-width:200px;border-radius:var(--r-md);cursor:zoom-in}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10000;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:var(--r-md)}
.card-modal-field{margin-bottom:15px}
.card-modal-field label{display:block;font-size:.85em;color:var(--g3);margin-bottom:5px}
.card-modal-field select,.card-modal-field input{width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--r-md);font-size:.9em}
.card-modal-field .qty-row{display:flex;align-items:center;gap:10px}
.card-modal-field .qty-row button{width:36px;height:36px;border:1px solid var(--border);background:var(--card);border-radius:var(--r-md);font-size:1.2em;cursor:pointer}
.card-modal-field .qty-row button:hover{background:var(--g6)}
.card-modal-field .qty-row span{font-size:1.2em;font-weight:600;min-width:30px;text-align:center}
.card-modal-lists{display:flex;gap:10px;flex-wrap:wrap}
.card-modal-lists label{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r-md);cursor:pointer;font-size:.85em}
.card-modal-lists label:has(input:checked){background:#e8f5e9;border-color:var(--success)}
.card-modal-lists input{margin:0}
.card-modal-actions{display:flex;gap:10px;margin-top:20px;padding-top:15px;border-top:1px solid #eee}
.card-modal-actions button{flex:1;padding:12px;border-radius:var(--r-md);cursor:pointer;font-size:.9em}
.card-modal-actions .save-btn{background:#22c55e;color:#fff;border:none}
.card-modal-actions .save-btn:hover{background:#16a34a}
.card-modal-actions .delete-btn{background:var(--card);color:var(--danger);border:1px solid #ef4444}
.card-modal-actions .delete-btn:hover{background:#fef2f2}

/* Empty state */
/* Set completion */
.set-progress{display:flex;flex-direction:column;gap:8px}
.set-row{display:flex;align-items:center;gap:12px;background:var(--card);padding:12px 15px;border-radius:var(--r-md)}
.set-name{width:120px;font-weight:600;font-size:.85em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.set-bar{flex:1;height:20px;background:#eee;border-radius:var(--r-lg);overflow:hidden}
.set-bar div{height:100%;border-radius:var(--r-lg);transition:width .3s}
.set-pct{width:100px;text-align:right;font-size:.85em;color:var(--g3)}

.empty-state{text-align:center;padding:60px 20px;color:var(--g3)}
.empty-state .icon{font-size:4em;margin-bottom:15px}
.empty-state h2{margin-bottom:10px;color:var(--g1)}
.empty-state p{margin-bottom:20px}
.empty-state .btn{display:inline-block;background:var(--pk);color:#fff;padding:12px 24px;border-radius:var(--r-md);text-decoration:none}
.empty-state .btn:hover{background:#cc1010}

/* Login prompt */
/* Login prompt */
.login-overlay{position:relative;min-height:400px}
.login-bg{position:absolute;inset:0;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:var(--r-lg);opacity:0.15}
.login-prompt{position:relative;background:var(--card);border-radius:var(--r-lg);padding:50px 40px;text-align:center;max-width:420px;margin:40px auto;box-shadow:0 10px 40px rgba(0,0,0,0.1)}
.login-prompt h2{font-size:1.5em;margin-bottom:10px}
.login-prompt p{color:var(--g3);margin-bottom:25px;line-height:1.5}
.login-prompt .google-btn{background:var(--card);border:2px solid #4285f4;color:var(--info);padding:12px 24px;border-radius:25px;cursor:pointer;font-size:1em;font-weight:600;display:inline-flex;align-items:center;gap:10px;transition:all .2s}
.login-prompt .google-btn:hover{background:#4285f4;color:#fff}
.login-prompt .google-btn img{width:20px;height:20px}
.login-prompt .features{display:flex;gap:20px;justify-content:center;margin-top:30px;flex-wrap:wrap}
.login-prompt .feature{font-size:.85em;color:var(--g3)}
.login-prompt .feature span{display:block;font-size:1.5em;margin-bottom:5px}

/* Loading */
.loading{text-align:center;padding:60px;color:var(--g3)}

/* Mobile responsive */
@media (max-width: 768px) {
  .desktop-col{display:none}
  .card-list{overflow-x:hidden}
  .card-list table{min-width:0;width:100%}
  .card-list th,.card-list td{padding:5px 6px;font-size:.8em}
  .card-list img{width:28px;height:40px}
  .card-list .qty-btn{width:28px;height:28px;font-size:.85em}
  .card-list .cond-select,.card-list .lang-select{padding:6px 8px;font-size:.8em}
  .card-list .list-icon{width:28px;height:28px;font-size:.7em}
  .stat-card .value{font-size:1em}
  .stat-card .label{font-size:.7em}
  .filters{flex-direction:column;gap:10px}
  .filter-left{width:100%;gap:8px}
  .filter-group{flex:1;min-width:0}
  .filter-group select.filter{width:100%}
  .filter-label{display:none}
  select.filter{padding:8px;font-size:.85em}
  .util-btn{padding:6px 10px;font-size:.85em}
  .set-name{min-width:60px;font-size:.8em}
  .set-pct{min-width:70px;font-size:.75em}
}
/* Pagination */
.pagination{display:flex;justify-content:center;align-items:center;gap:15px;padding:20px;margin-top:10px}
.pagination button{padding:8px 16px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--card);cursor:pointer;font-size:.9em}
.pagination button:hover:not(:disabled){background:var(--g6);border-color:var(--g4)}
.pagination button:disabled{opacity:.4;cursor:not-allowed}
.pagination span{color:var(--g3);font-size:.9em}
</style>

<body>

<script src="/japan-tcg-price-guide/components/header.js"></script>

<div class="page-header">
  <h1 class="page-title">📦 My Collection</h1>
  <button class="util-btn add-btn" onclick="toggleAddCard()">＋ Add Card</button>
</div>

<div class="tcg-selector" id="tcg-selector">
  <button class="tcg-btn" data-tcg="pokemon" onclick="filterByGame('pokemon')">⚡ Pokemon</button>
  <button class="tcg-btn" data-tcg="onepiece" onclick="filterByGame('onepiece')">🏴‍☠️ One Piece</button>
</div>

<div class="add-card-bar" id="add-card-bar" style="display:none">
  <input type="text" id="add-card-input" placeholder="Type card name or ID…" oninput="searchAddCard(this.value)" autocomplete="off">
  <div class="add-suggestions" id="add-suggestions"></div>
</div>

<div id="content">
  <div class="loading">Loading collection...</div>
</div>

<!-- Card Detail Modal -->
<div class="card-modal-overlay" id="card-modal" onclick="if(event.target===this)closeCardModal()">
  <div class="card-modal">
    <div class="card-modal-header">
      <h3 id="modal-card-name">Card Name</h3>
      <button class="card-modal-close" onclick="closeCardModal()">×</button>
    </div>
    <div class="card-modal-body">
      <div class="card-modal-img"><img id="modal-card-img" src="" alt="" onclick="openLightbox(this.src)"></div>
      <div class="card-modal-field">
        <label>Quantity</label>
        <div class="qty-row">
          <button onclick="modalUpdateQty(-1)">−</button>
          <span id="modal-qty">1</span>
          <button onclick="modalUpdateQty(1)">+</button>
        </div>
      </div>
      <div class="card-modal-field">
        <label>Condition</label>
        <select id="modal-condition" onchange="modalUpdateField('condition',this.value)">
          <option value="NM">Near Mint (NM)</option>
          <option value="LP">Lightly Played (LP)</option>
          <option value="MP">Moderately Played (MP)</option>
          <option value="HP">Heavily Played (HP)</option>
          <option value="DMG">Damaged (DMG)</option>
        </select>
      </div>
      <div class="card-modal-field">
        <label>Language</label>
        <select id="modal-language" onchange="modalUpdateField('language',this.value)">
          <option value="JP">Japanese</option>
          <option value="EN">English</option>
        </select>
      </div>
      <div class="card-modal-field">
        <label>Lists</label>
        <div class="card-modal-lists" id="modal-lists"></div>
      </div>
      <div class="card-modal-field">
        <label>Avg. Purchase Price <small style="color:var(--g4)">(total paid ÷ qty)</small></label>
        <div style="display:flex;gap:6px">
          <select id="modal-currency" style="width:70px;padding:8px;border:1px solid var(--border);border-radius:var(--r-md)" onchange="modalUpdateField('currency',this.value)">
            <option value="JPY">¥</option>
            <option value="USD">$</option>
            <option value="EUR">€</option>
          </select>
          <input type="number" id="modal-purchase-price" placeholder="e.g. 500" min="0" style="flex:1" onchange="modalUpdateField('purchasePrice',Number(this.value)||0)">
        </div>
      </div>
      <div class="card-modal-field" id="modal-roi-field" style="display:none">
        <label>ROI</label>
        <span id="modal-roi" style="font-weight:bold;font-size:1.1em"></span>
      </div>
      <div class="card-modal-field">
        <label>Notes</label>
        <input type="text" id="modal-notes" placeholder="Add notes..." onchange="modalUpdateField('notes',this.value)">
      </div>
      <div class="card-modal-actions">
        <button class="delete-btn" onclick="modalDeleteCard()">🗑️ Remove</button>
        <button class="save-btn" onclick="saveAndCloseModal()">✓ Save</button>
        <button onclick="toggleReportForm()" style="flex:1;padding:12px;border:1px solid #f5c6cb;border-radius:var(--r-md);background:var(--card)3f3;cursor:pointer;color:var(--danger);font-size:.9em">⚠️ Report</button>
      </div>
      <div id="report-form" style="display:none;margin-top:12px;padding:12px;background:#fef9f9;border:1px solid #f5c6cb;border-radius:var(--r-md)">
        <select id="report-type" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px">
          <option value="">Select issue type…</option>
          <option value="wrong_image">Wrong Image</option>
          <option value="wrong_price">Wrong Price</option>
          <option value="wrong_rarity">Wrong Rarity</option>
          <option value="missing_variant">Missing Variant</option>
          <option value="wrong_name">Wrong Name</option>
          <option value="other">Other</option>
        </select>
        <input id="report-comment" type="text" placeholder="Details (optional)" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;box-sizing:border-box">
        <button onclick="submitReport()" style="width:100%;padding:10px;background:#d32f2f;color:#fff;border:none;border-radius:var(--r-sm);cursor:pointer;font-weight:bold">Submit Report</button>
      </div>
    </div>
  </div>
</div>

<script>
let allCards = [], collectionCards = [], currentUser = null, userCollection = {};
let currentGame = localStorage.getItem('collection-tcg') || null, currentSort = 'added', currentList = 'inventory';
let currentPage = 1;
const PAGE_SIZE = 50;

// List types: inventory (all owned), wishlist/tradelist are filtered views
const listTypes = ['inventory', 'wishlist', 'tradelist'];
const tabTypes = ['inventory', 'wishlist', 'tradelist', 'sets'];
const tabLabels = {inventory: '📦 Inventory', wishlist: '⭐ Wishlist', tradelist: '🔄 Tradelist', sets: '📊 Sets'};
const listLabels = {inventory: '📦 Inventory', wishlist: '⭐ Wishlist', tradelist: '🔄 Tradelist'};

// Auth functions
function signInWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err => console.error('Sign in error:', err));
}

function signOut() {
  auth.signOut();
}

// Get local collection - always from inventory, filter by list
function getLocalCollection() {
  return JSON.parse(localStorage.getItem('tcg_inventory') || '{}');
}

// Get filtered view based on current list
function getFilteredCollection() {
  if (currentList === 'inventory') return userCollection;
  // Filter cards that have the list flag set
  const filtered = {};
  for (const [id, card] of Object.entries(userCollection)) {
    if (card.lists && card.lists[currentList]) filtered[id] = card;
  }
  return filtered;
}

// Auth state listener
auth.onAuthStateChanged(async user => {
  if (user) {
    currentUser = user;
    await loadUserCollection(user.uid);
  } else {
    currentUser = null;
    userCollection = getLocalCollection();
  }
  authChecked = true;
  renderIfReady();
  updateTcgSelector();
});

async function loadUserCollection(uid) {
  try {
    userCollection = {};
    // Always load from inventory collection
    const snapshot = await db.collection('users').doc(uid).collection('inventory').get();
    snapshot.forEach(doc => { userCollection[doc.id] = doc.data(); });
    console.log(`Loaded ${Object.keys(userCollection).length} cards from Firestore`);
  } catch(e) {
    console.error('Firestore load error:', e);
    userCollection = getLocalCollection();
  }
}

function switchList(list) {
  currentList = list;
  currentPage = 1;
  // Update URL without reload
  const url = new URL(window.location);
  url.searchParams.set('list', list);
  history.pushState({}, '', url);
  renderCollection();
}

async function removeFromCollection(cardId) {
  delete userCollection[cardId];
  if (currentUser) {
    await db.collection('users').doc(currentUser.uid).collection('inventory').doc(cardId).delete();
  } else {
    localStorage.setItem('tcg_inventory', JSON.stringify(userCollection));
  }
  renderCollection();
}

async function updateQuantity(cardId, delta) {
  const current = userCollection[cardId]?.qty || 1;
  const newQty = Math.max(1, current + delta);
  userCollection[cardId] = {...(userCollection[cardId] || {}), qty: newQty};
  
  if (currentUser) {
    await db.collection('users').doc(currentUser.uid).collection('inventory').doc(cardId).update({qty: newQty});
  } else {
    localStorage.setItem('tcg_inventory', JSON.stringify(userCollection));
  }
  renderCollection();
}

const conditions = ['NM', 'LP', 'MP', 'HP', 'DMG'];
const conditionLabels = {NM: 'Near Mint', LP: 'Lightly Played', MP: 'Moderately Played', HP: 'Heavily Played', DMG: 'Damaged'};

async function cycleCondition(e, cardId) {
  e.stopPropagation();
  const current = userCollection[cardId]?.condition || 'NM';
  const idx = conditions.indexOf(current);
  const next = conditions[(idx + 1) % conditions.length];
  userCollection[cardId] = {...(userCollection[cardId] || {}), condition: next};
  
  if (currentUser) {
    await db.collection('users').doc(currentUser.uid).collection('inventory').doc(cardId).update({condition: next});
  } else {
    localStorage.setItem('tcg_inventory', JSON.stringify(userCollection));
  }
  renderCollection();
}

// Modal functions
let modalCardId = null;
const _cs = JSON.parse(localStorage.getItem('tcg_settings') || '{}');
let currentView = _cs.collectionView || 'list';
let currentSortCol = 'name';
let currentSortDir = 'asc';

function openCardModal(cardId) {
  modalCardId = cardId;
  const card = allCards.find(c => c.id === cardId);
  const data = userCollection[cardId] || {};
  
  document.getElementById('modal-card-name').textContent = card?.name || cardId;
  const proxyImg = url => url?.includes('onepiece-cardgame.com') ? `https://wsrv.nl/?url=${encodeURIComponent(url)}` : url;
  const img = proxyImg(card?.imgJp) || (card?.game === 'onepiece' ? proxyImg(card?.img) : card?.image + '/low.webp') || '';
  document.getElementById('modal-card-img').src = img;
  document.getElementById('modal-qty').textContent = data.qty || 1;
  document.getElementById('modal-condition').value = data.condition || 'NM';
  document.getElementById('modal-language').value = data.language || 'JP';
  document.getElementById('modal-notes').value = data.notes || '';
  document.getElementById('modal-currency').value = data.currency || localStorage.getItem('tcg-currency') || 'JPY';
  
  // Purchase price & ROI
  const ppInput = document.getElementById('modal-purchase-price');
  ppInput.value = data.purchasePrice || '';
  const card2 = allCards.find(c => c.id === cardId);
  const marketJpy = getPrice(card2) ? Math.round(getPrice(card2) * 150) : null;
  const roiField = document.getElementById('modal-roi-field');
  const roiSpan = document.getElementById('modal-roi');
  if (data.purchasePrice && marketJpy) {
    const roi = marketJpy - data.purchasePrice;
    roiSpan.textContent = `¥${roi >= 0 ? '+' : ''}${roi.toLocaleString()} (${roi >= 0 ? '+' : ''}${Math.round(roi / data.purchasePrice * 100)}%)`;
    roiSpan.style.color = roi >= 0 ? '#16a34a' : '#dc2626';
    roiField.style.display = '';
  } else {
    roiField.style.display = 'none';
  }
  
  // Show list checkboxes
  const listsHtml = listTypes.map(list => {
    const inList = currentList === list || (currentUser ? false : !!getLocalCollection(list)[cardId]);
    return `<label><input type="checkbox" ${inList ? 'checked' : ''} onchange="modalToggleList('${list}',this.checked)"> ${listLabels[list]}</label>`;
  }).join('');
  document.getElementById('modal-lists').innerHTML = listsHtml;
  
  document.getElementById('card-modal').classList.add('show');
}

function closeCardModal() {
  document.getElementById('card-modal').classList.remove('show');
  document.getElementById('report-form').style.display='none';
  modalCardId = null;
}

function openLightbox(src) {
  const hiRes = src.replace('/low.webp', '/high.png');
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.onclick = () => lb.remove();
  lb.innerHTML = `<img src="${hiRes}" alt="">`;
  document.body.appendChild(lb);
}

// Card error reporting
function toggleReportForm() {
  const f = document.getElementById('report-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  if (f.style.display === 'block') { document.getElementById('report-type').value = ''; document.getElementById('report-comment').value = ''; f.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}
function getDeviceId() {
  let id = localStorage.getItem('tcg_device_id');
  if (!id) { id = crypto.randomUUID(); localStorage.setItem('tcg_device_id', id); }
  return id;
}
function checkRateLimit() {
  const now = Date.now(), key = 'tcg_report_times';
  let times = JSON.parse(localStorage.getItem(key) || '[]').filter(t => now - t < 3600000);
  if (times.length >= 5) return false;
  times.push(now);
  localStorage.setItem(key, JSON.stringify(times));
  return true;
}
function showReportToast(msg, isError) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {position:'fixed',bottom:'20px',left:'50%',transform:'translateX(-50%)',background:isError?'#d32f2f':'#16a34a',color:'#fff',padding:'12px 20px',borderRadius:'8px',fontSize:'.9em',zIndex:'2000',transition:'opacity .5s',fontWeight:'500'});
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3000);
}
async function submitReport() {
  const type = document.getElementById('report-type').value;
  if (!type) { showReportToast('Please select an issue type', true); return; }
  if (!checkRateLimit()) { showReportToast('Too many reports — try again later', true); return; }
  if (!modalCardId) return;
  const card = userCollection[modalCardId] || {};
  try {
    await db.collection('card-reports').add({
      cardId: modalCardId, cardName: card.name || modalCardId,
      game: card.game || 'unknown', set: card.set || '',
      issueType: type, comment: document.getElementById('report-comment').value || '',
      reportedAt: firebase.firestore.FieldValue.serverTimestamp(),
      deviceId: getDeviceId(), status: 'open'
    });
    document.getElementById('report-form').style.display = 'none';
    showReportToast('✅ Report received — thanks for helping improve the guide!');
  } catch(e) { console.error('Report failed:', e); showReportToast('Failed to submit — please try again', true); }
}

function saveAndCloseModal() {
  closeCardModal();
  renderCollection(); // Re-render to show updated values
}

async function modalUpdateQty(delta) {
  if (!modalCardId) return;
  const current = userCollection[modalCardId]?.qty || 1;
  const newQty = Math.max(1, current + delta);
  document.getElementById('modal-qty').textContent = newQty;
  
  // Update local state first
  if (!userCollection[modalCardId]) userCollection[modalCardId] = {};
  userCollection[modalCardId].qty = newQty;
  
  if (currentUser) {
    await db.collection('users').doc(currentUser.uid).collection('inventory').doc(modalCardId).update({qty: newQty});
  } else {
    localStorage.setItem('tcg_inventory', JSON.stringify(userCollection));
  }
}

async function modalUpdateField(field, value) {
  if (!modalCardId) return;
  userCollection[modalCardId] = {...(userCollection[modalCardId] || {}), [field]: value};
  if (currentUser) {
    await db.collection('users').doc(currentUser.uid).collection('inventory').doc(modalCardId).update({[field]: value});
  } else {
    localStorage.setItem('tcg_inventory', JSON.stringify(userCollection));
  }
}

async function modalToggleList(list, checked) {
  if (!modalCardId) return;
  if (!userCollection[modalCardId]) userCollection[modalCardId] = {};
  if (!userCollection[modalCardId].lists) userCollection[modalCardId].lists = {};
  userCollection[modalCardId].lists[list] = checked;
  
  if (currentUser) {
    await db.collection('users').doc(currentUser.uid).collection('inventory').doc(modalCardId).update({lists: userCollection[modalCardId].lists});
  } else {
    localStorage.setItem('tcg_inventory', JSON.stringify(userCollection));
  }
}

async function modalDeleteCard() {
  if (!modalCardId) return;
  await removeFromCollection(modalCardId);
  closeCardModal();
}

function toggleView(view) {
  currentView = view;
  const s = JSON.parse(localStorage.getItem('tcg_settings') || '{}'); s.collectionView = view; localStorage.setItem('tcg_settings', JSON.stringify(s));
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  document.querySelector('.card-grid')?.classList.toggle('hidden', view === 'list');
  document.querySelector('.card-list')?.classList.toggle('active', view === 'list');
}

// Inline editing functions for list view
async function inlineUpdateField(cardId, field, value) {
  if (!userCollection[cardId]) return;
  userCollection[cardId][field] = value;
  
  if (currentUser) {
    await db.collection('users').doc(currentUser.uid).collection('inventory').doc(cardId).update({[field]: value});
  } else {
    localStorage.setItem('tcg_inventory', JSON.stringify(userCollection));
  }
}

async function inlineToggleList(cardId, list) {
  if (!userCollection[cardId]) return;
  if (!userCollection[cardId].lists) userCollection[cardId].lists = {};
  userCollection[cardId].lists[list] = !userCollection[cardId].lists[list];
  
  if (currentUser) {
    await db.collection('users').doc(currentUser.uid).collection('inventory').doc(cardId).update({lists: userCollection[cardId].lists});
  } else {
    localStorage.setItem('tcg_inventory', JSON.stringify(userCollection));
  }
  renderCollection();
}

// Load all cards
async function loadCards() {
  try {
    // Load Pokemon
    let pokemonCards = [];
    try {
      const manifest = await fetch('data/shards/manifest.json').then(r => r.json());
      const shards = await Promise.all(Object.values(manifest.shards).map(s => 
        fetch(`data/shards/${s.file}`).then(r => r.json())
      ));
      pokemonCards = shards.flatMap(s => Object.values(s.sets).flat()).map(c => ({...c, game: 'pokemon'}));
    } catch(e) {
      const data = await fetch('data/brain-cache.json').then(r => r.json());
      pokemonCards = Object.values(data.sets).flat().map(c => ({...c, game: 'pokemon'}));
    }
    
    // Load One Piece
    let opCards = [];
    try {
      const data = await fetch('data/onepiece-cache.json').then(r => r.json());
      opCards = Object.values(data.sets).flat().map(c => ({...normalizeOPCard(c), game: 'onepiece'}));
    } catch(e) {}
    
    allCards = [...pokemonCards, ...opCards];
  } catch(e) {
    console.error('Error loading cards:', e);
  }
}

function getPrice(c) {
  if (c.pricing?.usd) return c.pricing.usd;
  if (c.pricing?.tcgplayer?.normal?.marketPrice) return c.pricing.tcgplayer.normal.marketPrice;
  if (c.pricing?.tcgplayer?.holofoil?.marketPrice) return c.pricing.tcgplayer.holofoil.marketPrice;
  if (c.pricing?.cardmarket?.trend) return c.pricing.cardmarket.trend * 1.08;
  return null;
}

function renderCollection() {
  const content = document.getElementById('content');
  const filteredCollection = getFilteredCollection();
  const collectionIds = Object.keys(filteredCollection);
  
  // Get counts for tabs
  const getListCount = list => {
    if (list === 'inventory') return Object.keys(userCollection).length;
    if (list === 'sets') return ''; // No count for sets tab
    return Object.values(userCollection).filter(c => c.lists && c.lists[list]).length;
  };
  
  const tabsHtml = `
    <div class="list-tabs">
      ${tabTypes.map(list => `
        <button class="list-tab ${list} ${currentList === list ? 'active' : ''}" onclick="switchList('${list}')">
          ${tabLabels[list]}<span class="count">(${getListCount(list)})</span>
        </button>
      `).join('')}
    </div>
    <div class="util-row">
      <a href="backup.html" class="util-btn" style="text-decoration:none">💾 Backup</a>
      <button class="util-btn" onclick="shareCollection()">🔗 Share</button>
      <button class="util-btn" onclick="exportCollection()">📥 Export</button>
    </div>
`;
  
  const emptyMessages = {
    inventory: {icon: '📦', title: 'Your inventory is empty', desc: 'Search for cards to add them to your collection.'},
    wishlist: {icon: '⭐', title: 'Your wishlist is empty', desc: 'Click ⭐ on cards in your inventory to add them here.'},
    tradelist: {icon: '🔄', title: 'Your tradelist is empty', desc: 'Click 🔄 on cards in your inventory to add them here.'}
  };
  
  // Sets completion view
  if (currentList === "sets") {
    const game = currentGame || 'onepiece';
    const setStats = {};
    for (const id of Object.keys(userCollection)) {
      const card = allCards.find(c => c.id === id);
      if (!card || card.game !== game) continue;
      const setId = card.setId || card.set || "unknown";
      if (!setStats[setId]) setStats[setId] = { owned: 0, total: 0, game: card.game };
      setStats[setId].owned++;
    }
    for (const card of allCards) {
      if (card.game !== game) continue;
      const setId = card.setId || card.set || "unknown";
      if (!setStats[setId]) setStats[setId] = { owned: 0, total: 0, game: card.game };
      setStats[setId].total++;
    }
    const sets = Object.entries(setStats)
      .filter(([,s]) => s.owned > 0)
      .sort((a,b) => (b[1].owned/b[1].total) - (a[1].owned/a[1].total));
    
    content.innerHTML = tabsHtml + `
      <div class="set-progress">
        ${sets.length ? sets.map(([setId, s]) => {
          const pct = Math.round(s.owned / s.total * 100);
          const color = pct >= 75 ? '#16a34a' : pct >= 25 ? '#f59e0b' : '#ef4444';
          return `<div class="set-row">
            <div class="set-name">${setId}</div>
            <div class="set-bar"><div style="width:${pct}%;background:${color}"></div></div>
            <div class="set-pct">${s.owned}/${s.total} (${pct}%)</div>
          </div>`;
        }).join("") : "<p style=\"text-align:center;color:var(--g3)\">Add cards to see set completion</p>"}
      </div>`;
    return;
  }

  if (!collectionIds.length) {
    const msg = emptyMessages[currentList];
    // Show login prompt for non-logged users
    if (!currentUser && currentList === "inventory") {
      content.innerHTML = tabsHtml + `
        <div class="login-overlay">
          <div class="login-bg"></div>
          <div class="login-prompt">
            <h2>📦 Start Your Collection</h2>
            <p>Sign in to track your cards across devices, see your collection value, and never lose your data.</p>
            <button class="google-btn" onclick="signInWithGoogle()">
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
              Sign in with Google
            </button>
            <div class="features">
              <div class="feature"><span>☁️</span>Cloud sync</div>
              <div class="feature"><span>💰</span>Track value</div>
              <div class="feature"><span>📱</span>Any device</div>
            </div>
          </div>
        </div>`;
      return;
    }
    content.innerHTML = tabsHtml + `
      <div class="empty-state">
        <div class="icon">${msg.icon}</div>
        <h2>${msg.title}</h2>
        <p>${msg.desc}</p>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <a href="search.html" class="btn">🔍 Search Cards</a>
        </div>
      </div>`;
    return;
  }
  
  // Get collection cards with full data
  collectionCards = collectionIds.map(id => allCards.find(c => c.id === id)).filter(Boolean);
  
  // Apply game filter
  let filtered = currentGame ? collectionCards.filter(c => c.game === currentGame) : collectionCards;
  
  // Sort
  if (currentSort === 'name') filtered.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  else if (currentSort === 'price-high') filtered.sort((a, b) => (getPrice(b) || 0) - (getPrice(a) || 0));
  else if (currentSort === 'price-low') filtered.sort((a, b) => (getPrice(a) || 999999) - (getPrice(b) || 999999));
  else if (currentSort === 'set') filtered.sort((a, b) => (a.setId || '').localeCompare(b.setId || '') || (a.id || '').localeCompare(b.id || ''));
  else if (currentSort === 'roi') filtered.sort((a, b) => {
    const roiA = userCollection[a.id]?.purchasePrice ? ((getPrice(a)||0)*fxRate - userCollection[a.id].purchasePrice) / userCollection[a.id].purchasePrice : -Infinity;
    const roiB = userCollection[b.id]?.purchasePrice ? ((getPrice(b)||0)*fxRate - userCollection[b.id].purchasePrice) / userCollection[b.id].purchasePrice : -Infinity;
    return roiB - roiA;
  });
  // 'added' - keep original order (most recent first for Firestore)
  
  // Calculate stats - scoped to current TCG filter
  const getQty = id => userCollection[id]?.qty || 1;
  const userCurrency = localStorage.getItem('tcg-currency') || 'JPY';
  const fxRate = userCurrency === 'USD' ? 1 : 150;
  const cSymbol = userCurrency === 'USD' ? '$' : '¥';
  const formatPrice = p => p !== null ? cSymbol + Math.round(p * fxRate).toLocaleString() : '-';
  const statsCards = currentGame ? collectionCards.filter(c => c.game === currentGame) : collectionCards;
  const totalCards = statsCards.reduce((sum, c) => sum + getQty(c.id), 0);
  const totalValue = statsCards.reduce((sum, c) => sum + (getPrice(c) || 0) * getQty(c.id), 0);
  const estValueFmt = Math.round(totalValue * fxRate);
  // ROI: only count cards that have a purchase price entered
  const pricedCards = statsCards.filter(c => (userCollection[c.id]?.purchasePrice || 0) > 0);
  const costJpy = pricedCards.reduce((sum, c) => sum + userCollection[c.id].purchasePrice * getQty(c.id), 0);
  const pricedValueJpy = Math.round(pricedCards.reduce((sum, c) => sum + (getPrice(c) || 0) * getQty(c.id), 0) * 150);
  const roiRaw = costJpy > 0 ? pricedValueJpy - costJpy : null;
  const roiPct = costJpy > 0 ? Math.round((roiRaw / costJpy) * 100) : null;
  const roiFmt = roiRaw !== null ? Math.round(roiRaw / (fxRate === 1 ? 150 : 1)) : null;
  const costFmt = Math.round(costJpy / (fxRate === 1 ? 150 : 1));
  
  const proxyImg = url => url?.includes('onepiece-cardgame.com') ? `https://wsrv.nl/?url=${encodeURIComponent(url)}` : url;
  const getImg = c => proxyImg(c.imgJp) || (c.game === 'onepiece' ? proxyImg(c.img) : c.image + '/low.webp') || '';
  
  content.innerHTML = tabsHtml + `
    <div class="stats-row">
      <div class="stat-card">
        <div class="value">${totalCards}</div>
        <div class="label">Total Cards</div>
      </div>
      <div class="stat-card">
        <div class="value">${statsCards.length}</div>
        <div class="label">Unique</div>
      </div>
      <div class="stat-card">
        <div class="value">${cSymbol}${estValueFmt.toLocaleString()}</div>
        <div class="label">Est. Value</div>
      </div>${costJpy > 0 ? `
      <div class="stat-card">
        <div class="value">${cSymbol}${costFmt.toLocaleString()}</div>
        <div class="label">Purchase Value</div>
      </div>
      <div class="stat-card">
        <div class="value" style="color:${roiFmt >= 0 ? '#16a34a' : '#dc2626'}">${cSymbol}${roiFmt >= 0 ? '+' : ''}${roiFmt.toLocaleString()}</div>
        <div class="label" style="color:${roiFmt >= 0 ? '#16a34a' : '#dc2626'}">${roiPct >= 0 ? '+' : ''}${roiPct}% ROI</div>
      </div>` : ''}
    </div>
    
    <div class="filters">
      <div class="filter-left">

        <div class="filter-group">
          <span class="filter-label">Sort:</span>
          <select class="filter" id="sort-filter" onchange="sortBy(this.value)">
            <option value="added" ${currentSort === 'added' ? 'selected' : ''}>Recently Added</option>
            <option value="name" ${currentSort === 'name' ? 'selected' : ''}>Name</option>
            <option value="price-high" ${currentSort === 'price-high' ? 'selected' : ''}>Price: High → Low</option>
            <option value="price-low" ${currentSort === 'price-low' ? 'selected' : ''}>Price: Low → High</option>
            <option value="set" ${currentSort === 'set' ? 'selected' : ''}>Set</option>
            <option value="roi" ${currentSort === 'roi' ? 'selected' : ''}>ROI: High → Low</option>
          </select>
        </div>
        <div class="view-toggle">
          <button class="view-btn ${currentView === 'grid' ? 'active' : ''}" data-view="grid" onclick="toggleView('grid')">▦ Grid</button>
          <button class="view-btn ${currentView === 'list' ? 'active' : ''}" data-view="list" onclick="toggleView('list')">☰ List</button>
        </div>
      </div>
    </div>
    
    <div class="card-grid ${currentView === 'list' ? 'hidden' : ''}">
      ${filtered.map(c => {
        const qty = getQty(c.id);
        const cond = userCollection[c.id]?.condition || 'NM';
        const lang = userCollection[c.id]?.language || 'JP';
        return `
        <div class="card-item" onclick="openCardModal('${c.id}')">
          <button class="remove-btn" onclick="event.stopPropagation();removeFromCollection('${c.id}')" title="Remove">×</button>
          ${qty > 1 ? `<span class="qty-badge">×${qty}</span>` : ''}
          <span class="condition-badge ${cond.toLowerCase()}" onclick="event.stopPropagation();cycleCondition(event,'${c.id}')" title="Click to change">${cond}</span>
          <div class="qty-controls" onclick="event.stopPropagation()">
            <button class="qty-btn" onclick="updateQuantity('${c.id}',-1)">−</button>
            <button class="qty-btn" onclick="updateQuantity('${c.id}',1)">+</button>
          </div>
          <img src="${getImg(c)}" alt="${c.name}" loading="lazy" referrerpolicy="no-referrer">
          <div class="name">${c.name || c.id}</div>
          <div class="meta">${c.setId} · ${c.rarity || '?'} · ${lang}</div>
          <div class="price">${formatPrice(getPrice(c))}${qty > 1 ? ` (×${qty})` : ''}${(() => {
            const pp = userCollection[c.id]?.purchasePrice;
            if (!pp || !getPrice(c)) return '';
            const roi = Math.round(getPrice(c) * 150) - pp;
            return ` <span style="font-size:.75em;color:${roi >= 0 ? '#16a34a' : '#dc2626'}">${roi >= 0 ? '+' : ''}¥${roi.toLocaleString()}</span>`;
          })()}</div>
        </div>`;
      }).join('')}
    </div>
    
    <div class="card-list ${currentView === 'list' ? 'active' : ''}">
      <table>
        <thead>
          <tr>
            <th style="width:40px"></th>
            <th onclick="sortBy('name')" class="${currentSort === 'name' ? 'sorted' : ''}">Card <span class="sort-icon">${currentSort === 'name' ? '▲' : '▽'}</span></th>
            <th onclick="sortBy('price-high')" class="${currentSort.includes('price') ? 'sorted' : ''}" style="width:70px">Price <span class="sort-icon">${currentSort === 'price-high' ? '▼' : '▽'}</span></th>
            <th style="width:80px">Qty</th>
            <th class="desktop-col" style="width:70px">Cond</th>
            <th class="desktop-col" style="width:55px">Lang</th>
            <th class="desktop-col" style="width:50px">Lists</th>
            <th style="width:30px"></th>
          </tr>
        </thead>
        <tbody>
          ${filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE).map(c => {
            const qty = getQty(c.id);
            const cond = userCollection[c.id]?.condition || 'NM';
            const lang = userCollection[c.id]?.language || 'JP';
            const inWish = userCollection[c.id]?.lists?.wishlist;
            const inTrade = userCollection[c.id]?.lists?.tradelist;
            return `
            <tr>
              <td onclick="openCardModal('${c.id}')"><img src="${getImg(c)}" alt="" loading="lazy" referrerpolicy="no-referrer"></td>
              <td onclick="openCardModal('${c.id}')"><strong>${c.name || c.id}</strong><br><a href="search.html?game=${c.game}&q=${c.id}" class="card-id-link" onclick="event.stopPropagation()">${c.id}</a>${c.rarity ? ' <small style="color:var(--g4)">· '+c.rarity+'</small>' : ''}</td>
              <td onclick="openCardModal('${c.id}')">${formatPrice(getPrice(c))}</td>
              <td onclick="event.stopPropagation()">
                <div class="qty-cell">
                  <button class="qty-btn" onclick="updateQuantity('${c.id}',-1)">−</button>
                  <span class="qty-val">${qty}</span>
                  <button class="qty-btn" onclick="updateQuantity('${c.id}',1)">+</button>
                </div>
              </td>
              <td class="desktop-col" onclick="event.stopPropagation()">
                <select class="cond-select" onchange="inlineUpdateField('${c.id}','condition',this.value)">
                  ${['NM','LP','MP','HP','DMG'].map(v => `<option value="${v}" ${cond === v ? 'selected' : ''}>${v}</option>`).join('')}
                </select>
              </td>
              <td class="desktop-col" onclick="event.stopPropagation()">
                <select class="lang-select" onchange="inlineUpdateField('${c.id}','language',this.value)">
                  <option value="JP" ${lang === 'JP' ? 'selected' : ''}>JP</option>
                  <option value="EN" ${lang === 'EN' ? 'selected' : ''}>EN</option>
                </select>
              </td>
              <td class="desktop-col" onclick="event.stopPropagation()">
                <div class="list-icons">
                  <span class="list-icon ${inWish ? 'active' : ''}" onclick="inlineToggleList('${c.id}','wishlist')" title="Wishlist">⭐</span>
                  <span class="list-icon ${inTrade ? 'active' : ''}" onclick="inlineToggleList('${c.id}','tradelist')" title="Tradelist">🔄</span>
                </div>
              </td>
              <td onclick="event.stopPropagation()"><a href="search.html?game=${c.game}&q=${c.id}" class="detail-btn" title="View card details" aria-label="View card details">🔗</a><button class="delete-btn" onclick="removeFromCollection('${c.id}')" title="Remove">🗑️</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      ${filtered.length > PAGE_SIZE ? `
        <div class="pagination">
          <button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>
          <span>Page ${currentPage} of ${Math.ceil(filtered.length / PAGE_SIZE)}</span>
          <button onclick="goToPage(${currentPage + 1})" ${currentPage >= Math.ceil(filtered.length / PAGE_SIZE) ? 'disabled' : ''}>Next →</button>
        </div>
      ` : ''}
    </div>
  `;
}

function goToPage(page) {
  currentPage = page;
  renderCollection();
  document.querySelector('.card-list')?.scrollIntoView({behavior: 'smooth'});
}

function filterByGame(game) {
  currentGame = game;
  localStorage.setItem('collection-tcg', game);
  currentPage = 1;
  updateTcgSelector();
  renderCollection();
}

function updateTcgSelector() {
  document.querySelectorAll('.tcg-btn').forEach(function(b) {
    var t = b.dataset.tcg;
    b.classList.remove('active','pk','op');
    if (t === currentGame) {
      b.classList.add('active');
      if (t === 'onepiece') b.classList.add('op');
    }
  });
}

function sortBy(sort) {
  currentSort = sort;
  currentPage = 1;
  renderCollection();
}

function exportCollection() {


  const rows = [['Card ID', 'Name', 'Set', 'Rarity', 'Game', 'Qty', 'Condition', 'Language', 'Price JPY', 'Total', 'Purchase Price', 'ROI']];
  collectionCards.forEach(c => {
    const qty = userCollection[c.id]?.qty || 1;
    const cond = userCollection[c.id]?.condition || 'NM';
    const lang = userCollection[c.id]?.language || 'JP';
    const price = getPrice(c);
    const pp = userCollection[c.id]?.purchasePrice || '';
    const roi = pp && price ? Math.round(price * 150) - pp : '';
    rows.push([c.id, c.name || '', c.setId || '', c.rarity || '', c.game, qty, cond, lang, price?.toFixed(2) || '', price ? (price * qty).toFixed(2) : '', pp, roi]);
  });
  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tcg-${currentList}-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

async function importCollection(input) {
  const file = input.files[0];
  if (!file) return;
  const text = await file.text();
  const lines = text.split("\n").slice(1); // Skip header
  let imported = 0;
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = line.match(/(".*?"|[^",]+)(?=,|$)/g)?.map(c => c.replace(/^"|"$/g, ""));
    if (!cols || !cols[0]) continue;
    const id = cols[0];
    const qty = parseInt(cols[5]) || 1;
    const condition = cols[6] || "NM";
    const language = cols[7] || "JP";
    userCollection[id] = { qty, condition, language, addedAt: Date.now() };
    imported++;
  }
  if (currentUser) {
    for (const [id, data] of Object.entries(userCollection)) {
      await db.collection("users").doc(currentUser.uid).collection("inventory").doc(id).set(data);
    }
  } else {
    localStorage.setItem("tcg_inventory", JSON.stringify(userCollection));
  }
  alert(`Imported ${imported} cards!`);
  input.value = "";
  renderCollection();
}

// Initialize
const params = new URLSearchParams(location.search);
if (params.get('list') && tabTypes.includes(params.get('list'))) {
  currentList = params.get('list');
}

let cardsLoaded = false;
let authChecked = false;

function renderIfReady() {
  if (cardsLoaded && authChecked) {
    if (!currentGame) {
      var op = 0, pk = 0;
      for (var id in userCollection) { var c = allCards.find(a => a.id === id); if (c) c.game === 'onepiece' ? op++ : pk++; }
      currentGame = pk > op ? 'pokemon' : 'onepiece';
      updateTcgSelector();
    }
    renderCollection();
  }
}

loadCards().then(() => {
  cardsLoaded = true;
  renderIfReady();
});

// Fallback: if auth takes too long, render with local data
setTimeout(() => {
  if (!authChecked) {
    console.log('Auth timeout, using local collection');
    authChecked = true;
    if (!currentUser) {
      userCollection = getLocalCollection();
    }
    renderIfReady();
  }
}, 3000);

// Auth will call renderIfReady when ready

<script>
function toggleAddCard(){
  var bar=document.getElementById('add-card-bar');
  var vis=bar.style.display!=='none';
  bar.style.display=vis?'none':'block';
  if(!vis){document.getElementById('add-card-input').focus();document.getElementById('add-card-input').value='';document.getElementById('add-suggestions').classList.remove('show');}
}

var _addDebounce;
function searchAddCard(q){
  clearTimeout(_addDebounce);
  var el=document.getElementById('add-suggestions');
  if(q.length<2){el.classList.remove('show');return;}
  _addDebounce=setTimeout(function(){
    var lq=q.toLowerCase();
    var game=currentGame||'onepiece';
    var pool=allCards.filter(function(c){return c.game===game});
    // Search by name or ID
    var matches=pool.filter(function(c){
      var name=(typeof c.name==='object'?(c.name.en||c.name.jp||''):(c.name||'')).toLowerCase();
      var id=(c.id||'').toLowerCase();
      return name.indexOf(lq)>=0||id.indexOf(lq)>=0;
    }).slice(0,15);
    if(!matches.length){el.innerHTML='<div class="add-sug" style="color:var(--g4);cursor:default">No cards found</div>';el.classList.add('show');return;}
    var proxyImg=function(url){return url&&url.includes('onepiece-cardgame.com')?'https://wsrv.nl/?url='+encodeURIComponent(url):url;};
    el.innerHTML=matches.map(function(c){
      var name=typeof c.name==='object'?(c.name.en||c.name.jp||''):(c.name||'');
      var img=proxyImg(c.imgJp||c.img||(c.image?c.image+'/low.webp':''))||'';
      var price=getPrice(c);
      var cur=localStorage.getItem('tcg-currency')||'JPY';
      var rate=cur==='USD'?1:150;var sym=cur==='USD'?'$':'¥';
      var pStr=price?sym+Math.round(price*rate).toLocaleString():'';
      var owned=userCollection[c.id]?'<span style="background:#16a34a;color:#fff;font-size:.7em;padding:2px 6px;border-radius:4px;margin-left:6px">owned ×'+((userCollection[c.id].qty||1))+'</span>':'';
      return '<div class="add-sug" onclick="quickAdd(\''+c.id.replace(/'/g,"\\'")+'\')">'
        +(img?'<img src="'+img+'" alt="" referrerpolicy="no-referrer">':'')
        +'<span class="s-name">'+name+'<br><small>'+c.id+(c.rarity?' · '+c.rarity:'')+'</small></span>'
        +'<span class="s-price">'+pStr+owned+'</span></div>';
    }).join('');
    el.classList.add('show');
  },150);
}

async function quickAdd(cardId){
  if(userCollection[cardId]){
    // Already in collection — increment qty
    await updateQuantity(cardId,1);
  }else{
    userCollection[cardId]={qty:1,condition:'NM',language:'JP',addedAt:new Date().toISOString()};
    if(currentUser){
      await db.collection('users').doc(currentUser.uid).collection('inventory').doc(cardId).set(userCollection[cardId]);
    }else{
      localStorage.setItem('tcg_inventory',JSON.stringify(userCollection));
    }
  }
  document.getElementById('add-card-input').value='';
  document.getElementById('add-suggestions').classList.remove('show');
  renderCollection();
}

// Close suggestions on outside click
document.addEventListener('click',function(e){
  if(!e.target.closest('.add-card-bar'))document.getElementById('add-suggestions')?.classList.remove('show');
});

// Keyboard nav for add-card suggestions
document.getElementById('add-card-input').addEventListener('keydown',function(e){
  var items=document.querySelectorAll('.add-sug');
  if(!items.length)return;
  var cur=[].indexOf.call(items,document.querySelector('.add-sug.highlighted'));
  if(e.key==='ArrowDown'){e.preventDefault();items.forEach(function(i){i.classList.remove('highlighted')});cur=Math.min(cur+1,items.length-1);items[cur].classList.add('highlighted');items[cur].scrollIntoView({block:'nearest'});}
  else if(e.key==='ArrowUp'){e.preventDefault();items.forEach(function(i){i.classList.remove('highlighted')});cur=Math.max(cur-1,0);items[cur].classList.add('highlighted');items[cur].scrollIntoView({block:'nearest'});}
  else if(e.key==='Enter'&&cur>=0){e.preventDefault();items[cur].click();}
});
</script>
